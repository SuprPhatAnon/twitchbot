<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Play Statistics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/common.css" rel="stylesheet">
</head>
<body>
    <div class="status-bar">
        <div class="d-flex align-items-center">
            <span class="h5 mb-0 me-4">Twitch Bot Statistics</span>
        </div>
        <div>
            <button id="theme-toggle" class="btn btn-outline-light btn-sm me-2" onclick="toggleTheme()">🌙</button>
            <a href="/admin.html" class="btn btn-outline-light btn-sm me-2" data-role="ROLE_ADMIN">Admin</a>
            <a href="/streamer.html" class="btn btn-outline-light btn-sm me-2" data-role="ROLE_STREAMER">Streamer</a>
            <a href="/song-management.html" class="btn btn-outline-light btn-sm me-2" data-role="ROLE_UPLOAD">Songs</a>
            <a href="/status.html" class="btn btn-outline-light btn-sm me-2">Status</a>
            <a href="/account.html" class="btn btn-outline-light btn-sm me-2">Account</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </div>

    <div class="container mt-4">
        <h1>Song Play Statistics</h1>

        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="range" class="form-label">Time Range</label>
                        <select id="range" class="form-select">
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="yearly">Yearly</option>
                            <option value="alltime" selected>All Time</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="groupBy" class="form-label">Group By</label>
                        <select id="groupBy" class="form-select">
                            <option value="song" selected>Song Name</option>
                            <option value="artist">Artist</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-primary w-100" onclick="loadStatistics()">Refresh</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive" style="max-height: 70vh;">
                    <table class="table table-hover mb-0" id="stats-table">
                        <thead class="table-dark">
                            <tr id="table-header">
                                <!-- Headers will be dynamic -->
                            </tr>
                        </thead>
                        <tbody id="stats-body">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        async function loadStatistics() {
            const range = document.getElementById('range').value;
            const groupBy = document.getElementById('groupBy').value;
            const headerRow = document.getElementById('table-header');
            const body = document.getElementById('stats-body');

            // Set Headers
            headerRow.innerHTML = '';
            if (groupBy === 'song') {
                headerRow.innerHTML = '<th>Art</th><th>Song</th><th>Artist</th><th>Plays</th>';
            } else {
                headerRow.innerHTML = '<th>Artist</th><th>Plays</th>';
            }

            try {
                const response = await fetch(`/api/songs/statistics?range=${range}&groupBy=${groupBy}`);
                if (response.status === 401 || response.status === 403) {
                    return;
                }
                const stats = await response.json();

                body.innerHTML = '';
                stats.forEach(item => {
                    const tr = document.createElement('tr');
                    if (groupBy === 'song') {
                        const artImg = item.coverArt ? `<img src="${item.coverArt}" alt="Art" style="width: 30px; height: 30px; object-fit: cover; border-radius: 2px;">` : '';
                        tr.innerHTML = `<td>${artImg}</td><td>${item.name}</td><td>${item.artist}</td><td>${item.playCount}</td>`;
                    } else {
                        tr.innerHTML = `<td>${item.artist}</td><td>${item.playCount}</td>`;
                    }
                    body.appendChild(tr);
                });
            } catch (error) {
                console.error('Error loading statistics:', error);
                body.innerHTML = '<tr><td colspan="4">Error loading statistics.</td></tr>';
            }
        }

        // Load default on startup
        loadStatistics();
    </script>
</body>
</html>
