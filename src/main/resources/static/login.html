<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Song Overlay - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/common.css" rel="stylesheet">
    <style>
        body { justify-content: center; align-items: center; background-color: #121212; padding-top: 0; }
        .login-container { background: #1e1e1e; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); width: 350px; border: 1px solid #333; }
        h1 { text-align: center; margin-bottom: 1.5rem; color: var(--twitch-purple); }
        .error { color: #ff5555; text-align: center; margin-top: 1rem; display: none; }
    </style>
</head>
<body data-bs-theme="dark">
    <div class="login-container">
        <h1>Login</h1>
        <form id="loginForm" action="/api/login" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-twitch w-100 py-2">Login</button>
            <div id="errorMessage" class="error">Invalid username or password</div>
        </form>
        <div class="mt-4 text-center">
            <a href="/player.html" class="text-decoration-none" style="color: var(--twitch-purple);">Go to Player</a>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            document.getElementById('errorMessage').style.display = 'block';
        }
    </script>
</body>
</html>
