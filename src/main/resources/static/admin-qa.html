<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Bot Admin QA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .card { background-color: #1e1e1e; border: 1px solid #333; margin-bottom: 20px; color: white; }
        .card-header { background-color: #252525; border-bottom: 1px solid #333; font-weight: bold; }
        .btn-twitch { background-color: #9146ff; color: white; }
        .btn-twitch:hover { background-color: #772ce8; color: white; }
        #log { height: 300px; overflow-y: auto; background-color: #000; color: #0f0; font-family: monospace; padding: 10px; border-radius: 5px; border: 1px solid #333; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .log-time { color: #888; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Admin QA UI - Twitch CLI Event Trigger</h1>
        
        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">Premade Events</div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="p-3 border rounded bg-dark">
                                    <h5>Channel Points Reward</h5>
                                    <div class="mb-3">
                                        <label class="form-label">Reward Title</label>
                                        <input type="text" id="reward-title" class="form-control bg-secondary text-white border-0" value="Play Random Song">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">User Name</label>
                                        <input type="text" id="reward-user" class="form-control bg-secondary text-white border-0" value="TestUser">
                                    </div>
                                    <button class="btn btn-twitch w-100" onclick="triggerReward()">Trigger Reward</button>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <div class="p-3 border rounded bg-dark">
                                    <h5>Bits / Cheer</h5>
                                    <div class="mb-3">
                                        <label class="form-label">Bits Amount</label>
                                        <input type="number" id="bits-amount" class="form-control bg-secondary text-white border-0" value="100">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">User Name</label>
                                        <input type="text" id="bits-user" class="form-control bg-secondary text-white border-0" value="TestCheerer">
                                    </div>
                                    <button class="btn btn-twitch w-100" onclick="triggerBits()">Trigger Bits</button>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="p-3 border rounded bg-dark">
                                    <h5>Follow</h5>
                                    <div class="mb-3">
                                        <label class="form-label">User Name</label>
                                        <input type="text" id="follow-user" class="form-control bg-secondary text-white border-0" value="NewFollower">
                                    </div>
                                    <button class="btn btn-twitch w-100" onclick="triggerFollow()">Trigger Follow</button>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="p-3 border rounded bg-dark">
                                    <h5>Subscribe</h5>
                                    <div class="mb-3">
                                        <label class="form-label">User Name</label>
                                        <input type="text" id="sub-user" class="form-control bg-secondary text-white border-0" value="NewSub">
                                    </div>
                                    <button class="btn btn-twitch w-100" onclick="triggerSubscribe()">Trigger Subscribe</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Custom Command</div>
                    <div class="card-body">
                        <form id="custom-form" onsubmit="event.preventDefault(); triggerCustom();">
                            <div class="row g-2">
                                <div class="col-md-4">
                                    <input type="text" id="custom-event" class="form-control bg-secondary text-white border-0" placeholder="Event Name (e.g. subscribe)">
                                </div>
                                <div class="col-md-6">
                                    <input type="text" id="custom-params" class="form-control bg-secondary text-white border-0" placeholder="Extra params (e.g. user=Bob&amount=500)">
                                </div>
                                <div class="col-md-2">
                                    <button type="submit" class="btn btn-primary w-100">Trigger</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Log / Response</div>
                    <div class="card-body">
                        <div id="log"></div>
                        <button class="btn btn-sm btn-outline-secondary mt-2 w-100" onclick="document.getElementById('log').innerHTML=''">Clear Log</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">Bot Status</div>
                    <div class="card-body">
                        <div id="connection-status" class="alert alert-secondary">Twitch Connection: Unknown</div>
                        <a href="/admin.html" class="btn btn-sm btn-link text-info">Go to Main Admin UI</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script>
        async function checkProfile() {
            try {
                const response = await fetch('/api/twitch-config/profiles');
                if (response.ok) {
                    const profiles = await response.json();
                    if (!profiles.includes('test')) {
                        document.body.innerHTML = `
                            <div class="container mt-5">
                                <div class="alert alert-danger">
                                    <h4>Access Denied</h4>
                                    <p>The Admin QA UI is only available in the <strong>test</strong> profile.</p>
                                    <a href="/admin.html" class="btn btn-primary">Go to Main Admin UI</a>
                                </div>
                            </div>
                        `;
                    }
                }
            } catch (e) {
                console.error('Error checking profile:', e);
            }
        }
        checkProfile();

        function log(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span style="color: ${type === 'error' ? '#f55' : '#0f0'}">${msg}</span>`;
            logDiv.prepend(entry);
        }

        async function triggerEvent(event, params = {}) {
            let url = `/api/qa/trigger?event=${event}`;
            for (const key in params) {
                url += `&${key}=${encodeURIComponent(params[key])}`;
            }
            
            log(`Triggering ${event}...`);
            try {
                const response = await fetch(url);
                const text = await response.text();
                if (response.ok) {
                    log(`Success: ${text}`);
                } else {
                    log(`Error: ${text}`, 'error');
                }
            } catch (e) {
                log(`Failed to fetch: ${e.message}`, 'error');
            }
        }

        function triggerReward() {
            const title = document.getElementById('reward-title').value;
            const user = document.getElementById('reward-user').value;
            // twitch-cli reward trigger: -r <reward-id-or-name> -u <user-name>
            // We use 'reward' (channel.channel_points_custom_reward_redemption.add)
            triggerEvent('reward', { 'reward-title': title, 'user-name': user });
        }

        function triggerBits() {
            const amount = document.getElementById('bits-amount').value;
            const user = document.getElementById('bits-user').value;
            // cheer (channel.cheer)
            triggerEvent('cheer', { 'bits': amount, 'user-name': user });
        }

        function triggerFollow() {
            const user = document.getElementById('follow-user').value;
            // follow (channel.follow)
            triggerEvent('follow', { 'user-name': user });
        }

        function triggerSubscribe() {
            const user = document.getElementById('sub-user').value;
            // subscribe (channel.subscribe)
            triggerEvent('subscribe', { 'user-name': user });
        }

        function triggerCustom() {
            const event = document.getElementById('custom-event').value;
            const paramsStr = document.getElementById('custom-params').value;
            const params = {};
            if (paramsStr) {
                paramsStr.split('&').forEach(pair => {
                    const [k, v] = pair.split('=');
                    if (k) params[k] = v || '';
                });
            }
            triggerEvent(event, params);
        }

        // Status update via WebSocket (same as admin.html)
        function connect() {
            const socket = new SockJS('/ws');
            const stompClient = Stomp.over(socket);
            stompClient.debug = null;
            stompClient.connect({}, (frame) => {
                stompClient.subscribe('/topic/connection-status', (msg) => {
                    const statusDiv = document.getElementById('connection-status');
                    const connected = JSON.parse(msg.body);
                    statusDiv.className = connected ? 'alert alert-success' : 'alert alert-danger';
                    statusDiv.innerText = 'Twitch Connection: ' + (connected ? 'CONNECTED' : 'DISCONNECTED');
                });
                
                // Fetch initial status
                fetch('/api/twitch-config/connection').then(r => r.json()).then(connected => {
                    const statusDiv = document.getElementById('connection-status');
                    statusDiv.className = connected ? 'alert alert-success' : 'alert alert-danger';
                    statusDiv.innerText = 'Twitch Connection: ' + (connected ? 'CONNECTED' : 'DISCONNECTED');
                });
            });
        }
        
        connect();
    </script>
</body>
</html>
