<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song File Management - Twitch Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/common.css" rel="stylesheet">
    <style>
        .table-responsive { max-height: 60vh; overflow-y: auto; }
        .status-badge { font-size: 0.8rem; }
        .playing-indicator { color: #0d6efd; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="status-bar">
        <div class="d-flex align-items-center">
            <span class="h5 mb-0 me-4">Twitch Bot Songs</span>
        </div>
        <div>
            <button id="theme-toggle" class="btn btn-outline-light btn-sm me-2" onclick="toggleTheme()">🌙</button>
            <a href="/admin.html" class="btn btn-outline-light btn-sm me-2" data-role="ROLE_ADMIN">Admin</a>
            <a href="/streamer.html" class="btn btn-outline-light btn-sm me-2" data-role="ROLE_STREAMER">Streamer</a>
            <a href="/song-management.html" class="btn btn-outline-light btn-sm me-2" data-role="ROLE_UPLOAD">Songs</a>
            <a href="/status.html" class="btn btn-outline-light btn-sm me-2">Status</a>
            <a href="/account.html" class="btn btn-outline-light btn-sm me-2">Account</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </div>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <!-- Upload Song Section -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Upload New Song</h5>
                    </div>
                    <div class="card-body">
                        <form id="upload-form" class="row g-3">
                            <div class="col-md-3">
                                <label for="upload-name" class="form-label small">Song Name</label>
                                <input type="text" class="form-control form-control-sm" id="upload-name" required>
                            </div>
                            <div class="col-md-3">
                                <label for="upload-artist" class="form-label small">Artist</label>
                                <input type="text" class="form-control form-control-sm" id="upload-artist" required>
                            </div>
                            <div class="col-md-4">
                                <label for="upload-file" class="form-label small">MP3 File</label>
                                <input type="file" class="form-control form-control-sm" id="upload-file" accept=".mp3" required>
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button type="submit" class="btn btn-sm btn-primary w-100" id="upload-submit-btn">Upload</button>
                            </div>
                        </form>
                        <div id="upload-status" class="mt-2 small"></div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header d-flex justify-content-between align-items-center bg-white">
                        <h5 class="mb-0">Song File Management</h5>
                        <div class="d-flex">
                            <div class="input-group input-group-sm me-2" style="width: 250px;">
                                <span class="input-group-text">Search</span>
                                <input type="text" id="search-input" class="form-control" oninput="renderTable()" placeholder="Filename, artist, title...">
                            </div>
                            <div class="btn-group btn-group-sm me-2">
                                <button id="filter-all" class="btn btn-secondary" onclick="setFilter('all')">All</button>
                                <button id="filter-orphan" class="btn btn-outline-danger" onclick="setFilter('orphan')">Orphans</button>
                                <button id="filter-ghost" class="btn btn-outline-warning" onclick="setFilter('ghost')">Ghosts</button>
                            </div>
                            <button class="btn btn-sm btn-primary" onclick="fetchData()">Refresh</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info py-2 small">
                            <strong>Note:</strong> Files marked as <span class="badge bg-danger">Orphan</span> are present on disk but not linked to any song in the database.
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Filename</th>
                                        <th>Linked Song</th>
                                        <th>Status</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="files-table-body">
                                    <tr><td colspan="4" class="text-center">Loading files...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Song Modal -->
    <div class="modal fade" id="songModal" tabindex="-1" aria-labelledby="songModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="songModalLabel">Edit Song</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="song-form">
                    <div class="modal-body">
                        <input type="hidden" id="modal-song-id">
                        <div class="mb-3">
                            <label for="modal-song-name" class="form-label">Song Name</label>
                            <input type="text" class="form-control" id="modal-song-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="modal-song-artist" class="form-label">Artist</label>
                            <input type="text" class="form-control" id="modal-song-artist" required>
                        </div>
                        <div class="mb-3">
                            <label for="modal-song-redeems" class="form-label">Redeems</label>
                            <select class="form-select" id="modal-song-redeems" multiple>
                                <!-- Options loaded from redeems -->
                            </select>
                            <div class="form-text">Hold Ctrl/Cmd to select multiple</div>
                        </div>
                        <div class="mb-3">
                            <label for="modal-song-url" class="form-label">Audio URL (or relative path)</label>
                            <input type="text" class="form-control" id="modal-song-url" required>
                        </div>
                        <div class="mb-3">
                            <label for="modal-song-cover" class="form-label">Cover Art (Optional)</label>
                            <input type="file" class="form-control" id="modal-song-cover" accept="image/*">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="modal-save-btn">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Hidden audio element for local playback -->
    <audio id="local-audio-player" style="display: none;"></audio>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/common.js"></script>
    <script>
        let songs = [];
        let files = [];
        let redeems = [];
        let ghostRecords = [];
        let currentFilter = 'all';
        let currentPlayingFile = null;
        const audioPlayer = document.getElementById('local-audio-player');

        async function fetchData() {
            try {
                const [songsRes, filesRes, redeemsRes, ghostRes] = await Promise.all([
                    fetch('/api/songs'),
                    fetch('/api/songs/files'),
                    fetch('/api/redeems'),
                    fetch('/api/songs/ghost-records')
                ]);
                
                if (songsRes.status === 401 || songsRes.status === 403 || 
                    filesRes.status === 401 || filesRes.status === 403 || 
                    redeemsRes.status === 401 || redeemsRes.status === 403) {
                    return;
                }

                songs = await songsRes.json();
                files = await filesRes.json();
                redeems = await redeemsRes.json();
                ghostRecords = await ghostRes.json();
                
                updateRedeemsSelect();
                renderTable();
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function updateRedeemsSelect() {
            const select = document.getElementById('modal-song-redeems');
            select.innerHTML = '';
            redeems.forEach(r => {
                const option = document.createElement('option');
                option.value = r.id;
                option.textContent = r.title;
                select.appendChild(option);
            });
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('#filter-all, #filter-orphan, #filter-ghost').forEach(btn => {
                btn.classList.remove('btn-secondary', 'btn-danger', 'btn-warning');
                btn.classList.add('btn-outline-secondary', 'btn-outline-danger', 'btn-outline-warning');
            });
            
            const activeBtn = document.getElementById(`filter-${filter}`);
            if (filter === 'all') {
                activeBtn.classList.remove('btn-outline-secondary');
                activeBtn.classList.add('btn-secondary');
            } else if (filter === 'orphan') {
                activeBtn.classList.remove('btn-outline-danger');
                activeBtn.classList.add('btn-danger');
            } else if (filter === 'ghost') {
                activeBtn.classList.remove('btn-outline-warning');
                activeBtn.classList.add('btn-warning');
            }
            
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('files-table-body');
            tbody.innerHTML = '';
            const searchInput = document.getElementById('search-input');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';

            // Map files to their songs
            const fileMap = {};
            files.forEach(filename => {
                const linkedSongs = songs.filter(s => s.url === '/' + filename);
                fileMap[filename] = linkedSongs;
            });

            let displayItems = [];

            if (currentFilter === 'ghost') {
                displayItems = ghostRecords.map(s => ({ type: 'ghost', song: s }));
            } else {
                files.forEach(filename => {
                    const linkedSongs = fileMap[filename];
                    if (currentFilter === 'orphan' && linkedSongs.length > 0) return;
                    displayItems.push({ type: 'file', filename, linkedSongs });
                });
            }

            // Apply search
            displayItems = displayItems.filter(item => {
                if (item.type === 'file') {
                    const matchesFilename = item.filename.toLowerCase().includes(searchTerm);
                    const matchesSongs = item.linkedSongs.some(s => s.name.toLowerCase().includes(searchTerm) || s.artist.toLowerCase().includes(searchTerm));
                    return matchesFilename || matchesSongs;
                } else if (item.type === 'ghost') {
                    return item.song.name.toLowerCase().includes(searchTerm) || item.song.artist.toLowerCase().includes(searchTerm) || item.song.url.toLowerCase().includes(searchTerm);
                }
                return false;
            });

            if (displayItems.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center">No ${currentFilter === 'all' ? '' : currentFilter} items found matching your search.</td></tr>`;
                return;
            }

            displayItems.forEach(item => {
                const tr = document.createElement('tr');
                
                if (item.type === 'file') {
                    const filename = item.filename;
                    const linkedSongs = item.linkedSongs;
                    let songCell = '<span class="text-muted small">No record</span>';
                    let statusBadge = '<span class="badge bg-danger status-badge">Orphan</span>';
                    
                    if (linkedSongs.length > 0) {
                        songCell = linkedSongs.map(s => `<div><strong>${s.name}</strong><br><small class="text-muted">by ${s.artist} (ID: ${s.id})</small></div>`).join('');
                        statusBadge = '<span class="badge bg-success status-badge">Linked</span>';
                    }

                    if (filename === 'playlist.m3u') {
                        statusBadge = '<span class="badge bg-info status-badge">System</span>';
                    }

                    const isPlaying = currentPlayingFile === filename;
                    const actionButtons = `
                        <div class="btn-group btn-group-sm">
                            ${filename !== 'playlist.m3u' ? `<button class="btn btn-sm ${isPlaying ? 'btn-danger' : 'btn-outline-primary'}" onclick="togglePlay(\`${filename.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)">${isPlaying ? 'Stop' : 'Play'}</button>` : ''}
                            ${linkedSongs.length > 0 
                                ? `<button class="btn btn-sm btn-outline-info" onclick="openEditModal(${linkedSongs[0].id})">Edit</button>`
                                : (filename !== 'playlist.m3u' ? `<button class="btn btn-sm btn-outline-success" onclick="openAddModal(\`${filename.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)">Add</button>` : '')
                            }
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteFile(\`${filename.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" ${filename === 'playlist.m3u' ? 'disabled' : ''}>Delete File</button>
                            ${linkedSongs.length > 0 ? `<button class="btn btn-sm btn-outline-danger" onclick="deleteSongPermanently(${linkedSongs[0].id})">Full Del</button>` : ''}
                        </div>
                    `;

                    tr.innerHTML = `
                        <td class="text-break">${isPlaying ? '<span class="playing-indicator me-1">▶</span>' : ''}${filename}</td>
                        <td>${songCell}</td>
                        <td>${statusBadge}</td>
                        <td class="text-end">${actionButtons}</td>
                    `;
                } else {
                    // Ghost Record
                    const s = item.song;
                    tr.classList.add('table-warning');
                    tr.innerHTML = `
                        <td class="text-break text-danger"><i class="small">Missing: ${s.url}</i></td>
                        <td><strong>${s.name}</strong><br><small class="text-muted">by ${s.artist} (ID: ${s.id})</small></td>
                        <td><span class="badge bg-warning text-dark status-badge">Ghost Record</span></td>
                        <td class="text-end">
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-sm btn-outline-info" onclick="openEditModal(${s.id})">Fix Link</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteSongOnly(${s.id})">Del Record</button>
                            </div>
                        </td>
                    `;
                }
                tbody.appendChild(tr);
            });
        }

        function togglePlay(filename) {
            if (currentPlayingFile === filename) {
                audioPlayer.pause();
                currentPlayingFile = null;
                renderTable();
            } else {
                audioPlayer.src = '/' + filename;
                audioPlayer.play().then(() => {
                    currentPlayingFile = filename;
                    renderTable();
                }).catch(e => {
                    console.error('Playback failed', e);
                    alert('Playback failed: ' + e.message);
                });
            }
        }

        audioPlayer.onended = () => {
            currentPlayingFile = null;
            renderTable();
        };

        // Modal Logic
        const songModal = new bootstrap.Modal(document.getElementById('songModal'));
        const songForm = document.getElementById('song-form');

        function openEditModal(id) {
            const song = songs.find(s => s.id === id);
            if (!song) return;
            
            document.getElementById('songModalLabel').textContent = 'Edit Song';
            document.getElementById('modal-song-id').value = song.id;
            document.getElementById('modal-song-name').value = song.name;
            document.getElementById('modal-song-artist').value = song.artist;
            document.getElementById('modal-song-url').value = song.url;
            document.getElementById('modal-song-cover').value = '';
            
            const redeemsSelect = document.getElementById('modal-song-redeems');
            Array.from(redeemsSelect.options).forEach(opt => {
                opt.selected = song.redeems.some(r => r.id == opt.value);
            });
            
            songModal.show();
        }

        function openAddModal(filename) {
            document.getElementById('songModalLabel').textContent = 'Add Song Record';
            document.getElementById('modal-song-id').value = '';
            document.getElementById('modal-song-name').value = filename.replace(/\.[^/.]+$/, ""); // strip extension
            document.getElementById('modal-song-artist').value = 'Unknown';
            document.getElementById('modal-song-url').value = '/' + filename;
            document.getElementById('modal-song-cover').value = '';
            
            const redeemsSelect = document.getElementById('modal-song-redeems');
            Array.from(redeemsSelect.options).forEach(opt => opt.selected = false);
            
            songModal.show();
        }

        songForm.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('modal-song-id').value;
            const name = document.getElementById('modal-song-name').value;
            const artist = document.getElementById('modal-song-artist').value;
            const url = document.getElementById('modal-song-url').value;
            const redeemsSelect = document.getElementById('modal-song-redeems');
            const selectedRedeems = Array.from(redeemsSelect.selectedOptions).map(opt => ({ id: opt.value }));
            const coverArtFile = document.getElementById('modal-song-cover').files[0];

            const songData = { name, artist, url, redeems: selectedRedeems };
            
            try {
                let res;
                if (id) {
                    // Update
                    const formData = new FormData();
                    formData.append('song', new Blob([JSON.stringify(songData)], { type: 'application/json' }));
                    if (coverArtFile) {
                        formData.append('coverArt', coverArtFile);
                    }
                    res = await fetch(`/api/songs/${id}`, {
                        method: 'PUT',
                        body: formData
                    });
                } else {
                    // Create
                    res = await fetch('/api/songs', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(songData)
                    });
                }

                if (res.status === 401 || res.status === 403) {
                    return;
                }

                if (res.ok) {
                    songModal.hide();
                    fetchData();
                } else {
                    const err = await res.text();
                    alert('Error saving song: ' + err);
                }
            } catch (err) {
                console.error('Error saving song', err);
            }
        };

        // Metadata pre-fill
        document.getElementById('upload-file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/songs/upload/metadata', {
                    method: 'POST',
                    headers: { 'X-API-KEY': getApiKey() },
                    body: formData
                });

                if (response.ok) {
                    const metadata = await response.json();
                    if (metadata.name && metadata.name !== 'Unknown Title') {
                        document.getElementById('upload-name').value = metadata.name;
                    }
                    if (metadata.artist && metadata.artist !== 'Unknown Artist') {
                        document.getElementById('upload-artist').value = metadata.artist;
                    }
                }
            } catch (error) {
                console.error('Failed to extract metadata:', error);
            }
        });

        // Upload Form Logic
        document.getElementById('upload-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('upload-name').value;
            const artist = document.getElementById('upload-artist').value;
            const file = document.getElementById('upload-file').files[0];
            const statusDiv = document.getElementById('upload-status');
            const submitBtn = document.getElementById('upload-submit-btn');

            const formData = new FormData();
            formData.append('file', file);
            formData.append('name', name);
            formData.append('artist', artist);

            submitBtn.disabled = true;
            statusDiv.innerHTML = '<span class="text-info">Uploading...</span>';

            try {
                const res = await fetch('/api/songs/upload', {
                    method: 'POST',
                    headers: { 'X-API-KEY': getApiKey() },
                    body: formData
                });
                if (res.status === 401 || res.status === 403) {
                    handleAuthError();
                    return;
                }
                if (res.ok) {
                    statusDiv.innerHTML = '<span class="text-success">Upload successful!</span>';
                    document.getElementById('upload-form').reset();
                    fetchData();
                } else {
                    const err = await res.text();
                    statusDiv.innerHTML = `<span class="text-danger">Upload failed: ${err}</span>`;
                }
            } catch (err) {
                statusDiv.innerHTML = `<span class="text-danger">Error: ${err.message}</span>`;
            } finally {
                submitBtn.disabled = false;
            }
        };

        async function deleteFile(filename) {
            if (!confirm(`Are you sure you want to delete the file "${filename}"?`)) return;
            try {
                const res = await fetch(`/api/songs/files/${filename}`, { 
                    method: 'DELETE',
                    headers: { 'X-API-KEY': getApiKey() }
                });
                if (res.status === 401 || res.status === 403) {
                    handleAuthError();
                    return;
                }
                if (res.ok) {
                    fetchData();
                } else {
                    const error = await res.text();
                    alert('Error deleting file: ' + error);
                }
            } catch (error) {
                console.error('Error deleting file:', error);
            }
        }

        async function deleteSongOnly(id) {
            if (!confirm(`Are you sure you want to delete ONLY the database record for song ID ${id}?`)) return;
            try {
                const res = await fetch(`/api/songs/${id}`, { 
                    method: 'DELETE',
                    headers: { 'X-API-KEY': getApiKey() }
                });
                if (res.status === 401 || res.status === 403) {
                    handleAuthError();
                    return;
                }
                if (res.ok) {
                    fetchData();
                } else {
                    const error = await res.text();
                    alert('Error deleting song record: ' + error);
                }
            } catch (error) {
                console.error('Error deleting song:', error);
            }
        }

        async function deleteSongPermanently(id) {
            if (!confirm(`Are you sure you want to PERMANENTLY delete song ID ${id} and its associated file? This cannot be undone.`)) return;
            try {
                const res = await fetch(`/api/songs/${id}/permanent`, { 
                    method: 'DELETE',
                    headers: { 'X-API-KEY': getApiKey() }
                });
                if (res.status === 401 || res.status === 403) {
                    handleAuthError();
                    return;
                }
                if (res.ok) {
                    fetchData();
                } else {
                    const error = await res.text();
                    alert('Error deleting song permanently: ' + error);
                }
            } catch (error) {
                console.error('Error deleting song:', error);
            }
        }

        async function deleteOrphanFiles() {
            const orphanFiles = files.filter(f => f !== 'playlist.m3u' && !songs.some(s => s.url === '/' + f));
            if (orphanFiles.length === 0) {
                alert('No orphan files found.');
                return;
            }
            if (!confirm(`Found ${orphanFiles.length} orphan files. Delete them all?`)) return;
            
            let successCount = 0;
            for (const filename of orphanFiles) {
                try {
                    const res = await fetch(`/api/songs/files/${filename}`, { 
                        method: 'DELETE',
                        headers: { 'X-API-KEY': getApiKey() }
                    });
                    if (res.status === 401 || res.status === 403) {
                        handleAuthError();
                        return;
                    }
                    if (res.ok) successCount++;
                } catch (e) { console.error('Error deleting', filename, e); }
            }
            alert(`Deleted ${successCount} out of ${orphanFiles.length} orphan files.`);
            fetchData();
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('theme-toggle').innerText = newTheme === 'dark' ? '☀️' : '🌙';
        }

        function logout() {
            localStorage.removeItem('apiKey');
            window.location.href = '/logout';
        }

        // Initialize theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
        document.getElementById('theme-toggle').innerText = savedTheme === 'dark' ? '☀️' : '🌙';

        fetchData();
    </script>
</body>
</html>
