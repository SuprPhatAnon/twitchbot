<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Bot Admin UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 20px; background-color: #f8f9fa; }
        .card { margin-bottom: 20px; }
        .health-status { font-weight: bold; }
        .status-up { color: green; }
        .status-down { color: red; }
        #redeem-log {
            height: 300px;
            overflow-y: auto;
            background-color: #f1f3f5;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .redeem-entry {
            margin-bottom: 5px;
            padding-bottom: 5px;
            border-bottom: 1px solid #dee2e6;
        }
        .redeem-time { color: #6c757d; font-size: 0.8rem; }
        .redeem-user { font-weight: bold; color: #0d6efd; }
        .redeem-reward { color: #198754; }
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div class="auth-card">
            <h3 class="mb-3">Admin Access</h3>
            <div class="mb-3">
                <label class="form-label">API Key</label>
                <input type="password" class="form-control" id="api-key-input">
            </div>
            <button class="btn btn-primary w-100" onclick="saveApiKey()">Login</button>
        </div>
    </div>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Twitch Bot Admin</h1>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
        </div>
        
        <div class="row">
            <!-- Health Section -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">System Health</div>
                    <div class="card-body">
                        <p>System Status: <span id="system-status" class="health-status">Loading...</span></p>
                        <p>Stream Status: <span id="stream-status" class="health-status">Loading...</span></p>
                        <div id="health-details"></div>
                        <button class="btn btn-sm btn-outline-primary mt-2" onclick="refreshAllHealth()">Refresh Status</button>
                    </div>
                </div>

                <!-- Recent Redeems Section -->
                <div class="card">
                    <div class="card-header">Recent Redeems</div>
                    <div class="card-body">
                        <div id="redeem-log">
                            <!-- Redeems will be added here -->
                        </div>
                    </div>
                </div>

                <!-- Twitch Config Section -->
                <div class="card">
                    <div class="card-header">Twitch Configuration</div>
                    <div class="card-body">
                        <form id="twitch-config-form">
                            <div class="mb-2">
                                <label class="form-label small">Client ID</label>
                                <input type="password" class="form-control form-control-sm" id="twitch-client-id">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small">Client Secret</label>
                                <input type="password" class="form-control form-control-sm" id="twitch-client-secret">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small">Access Token</label>
                                <input type="password" class="form-control form-control-sm" id="twitch-access-token">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small">Channel Name</label>
                                <input type="text" class="form-control form-control-sm" id="twitch-channel-name">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small">Redeem Title</label>
                                <input type="text" class="form-control form-control-sm" id="twitch-redeem-title">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small">Song Delay (seconds)</label>
                                <input type="number" class="form-control form-control-sm" id="twitch-song-delay">
                            </div>
                            <button type="submit" class="btn btn-sm btn-primary w-100 mt-2">Update Config</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Add Song Section -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">Add New Song</div>
                    <div class="card-body">
                        <form id="add-song-form">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Song Name</label>
                                    <input type="text" class="form-control" id="song-name" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Artist</label>
                                    <input type="text" class="form-control" id="song-artist" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label">Audio URL</label>
                                    <input type="url" class="form-control" id="song-url" placeholder="https://example.com/audio.mp3" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Redeem Name</label>
                                    <input type="text" class="form-control" id="song-redeem" value="Play Random Song" required>
                                </div>
                                <div class="col-md-6 d-flex align-items-end">
                                    <button type="submit" class="btn btn-primary w-100">Add Song</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Songs List Section -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                Songs in Database
                <button class="btn btn-sm btn-outline-secondary" onclick="fetchSongs()">Refresh List</button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Artist</th>
                                <th>Redeem</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="songs-table-body">
                            <!-- Songs will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script>
        let stompClient = null;

        function connectWebSocket() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null; // Disable debug logging
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/topic/redeems', function (response) {
                    const redeem = JSON.parse(response.body);
                    addRedeemToLog(redeem);
                });
            }, function (error) {
                console.error('WebSocket Error: ' + error);
                setTimeout(connectWebSocket, 5000);
            });
        }

        function addRedeemToLog(redeem, prepend = true) {
            const logEl = document.getElementById('redeem-log');
            const entry = document.createElement('div');
            entry.className = 'redeem-entry';
            const time = new Date(redeem.timestamp).toLocaleTimeString();
            entry.innerHTML = `
                <div class="redeem-time">${time}</div>
                <div><span class="redeem-user">${redeem.user}</span>: <span class="redeem-reward">${redeem.rewardTitle}</span></div>
            `;
            if (prepend) {
                logEl.insertBefore(entry, logEl.firstChild);
            } else {
                logEl.appendChild(entry);
            }
        }

        async function fetchRecentRedeems() {
            const key = getApiKey();
            if (!key) return;
            try {
                const response = await fetch('/api/twitch-config/redeems', {
                    headers: { 'X-API-Key': key }
                });
                if (response.status === 401) return logout();
                const redeems = await response.json();
                const logEl = document.getElementById('redeem-log');
                logEl.innerHTML = '';
                // Redeems from API are in chronological order, we want to show newest first
                redeems.reverse().forEach(redeem => addRedeemToLog(redeem, false));
            } catch (error) {
                console.error('Error fetching recent redeems:', error);
            }
        }

        function getApiKey() {
            return localStorage.getItem('twitch_bot_api_key') || '';
        }

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value;
            if (key) {
                localStorage.setItem('twitch_bot_api_key', key);
                checkAuth();
                refreshAllHealth();
                fetchSongs();
                fetchTwitchConfig();
                fetchRecentRedeems();
                connectWebSocket();
            }
        }

        function logout() {
            localStorage.removeItem('twitch_bot_api_key');
            location.reload();
        }

        function checkAuth() {
            const key = getApiKey();
            const overlay = document.getElementById('auth-overlay');
            if (key) {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
            }
        }

        function refreshAllHealth() {
            fetchHealth();
            fetchStreamStatus();
        }

        async function fetchHealth() {
            const key = getApiKey();
            if (!key) return;
            try {
                const response = await fetch('/actuator/health', {
                    headers: { 'X-API-Key': key }
                });
                if (response.status === 401) return logout();
                const data = await response.json();
                const statusEl = document.getElementById('system-status');
                statusEl.innerText = data.status;
                statusEl.className = 'health-status ' + (data.status === 'UP' ? 'status-up' : 'status-down');
                
                let detailsHtml = '<ul>';
                if (data.components) {
                    for (const [key, value] of Object.entries(data.components)) {
                        detailsHtml += `<li>${key}: <span class="${value.status === 'UP' ? 'status-up' : 'status-down'}">${value.status}</span></li>`;
                    }
                }
                detailsHtml += '</ul>';
                document.getElementById('health-details').innerHTML = detailsHtml;
            } catch (error) {
                document.getElementById('system-status').innerText = 'Error';
                console.error('Error fetching health:', error);
            }
        }

        async function fetchStreamStatus() {
            const key = getApiKey();
            if (!key) return;
            try {
                const response = await fetch('/api/twitch-config/status', {
                    headers: { 'X-API-Key': key }
                });
                if (response.status === 401) return logout();
                const isOnline = await response.json();
                const statusEl = document.getElementById('stream-status');
                statusEl.innerText = isOnline ? 'ONLINE' : 'OFFLINE';
                statusEl.className = 'health-status ' + (isOnline ? 'status-up' : 'status-down');
            } catch (error) {
                document.getElementById('stream-status').innerText = 'Error';
                console.error('Error fetching stream status:', error);
            }
        }

        async function fetchSongs() {
            const key = getApiKey();
            if (!key) return;
            try {
                const response = await fetch('/api/songs', {
                    headers: { 'X-API-Key': key }
                });
                if (response.status === 401) return logout();
                const songs = await response.json();
                const tbody = document.getElementById('songs-table-body');
                tbody.innerHTML = '';
                
                songs.forEach(song => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${song.id}</td>
                        <td>${song.name}</td>
                        <td>${song.artist}</td>
                        <td>${song.redeemName}</td>
                        <td>
                            <button class="btn btn-sm btn-success me-1" onclick="playSong(${song.id})">Play</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteSong(${song.id})">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Error fetching songs:', error);
            }
        }

        async function fetchTwitchConfig() {
            const key = getApiKey();
            if (!key) return;
            try {
                const response = await fetch('/api/twitch-config', {
                    headers: { 'X-API-Key': key }
                });
                if (response.status === 401) return logout();
                if (response.ok) {
                    const config = await response.json();
                    document.getElementById('twitch-client-id').value = config.clientId || '';
                    document.getElementById('twitch-client-secret').value = config.clientSecret || '';
                    document.getElementById('twitch-access-token').value = config.accessToken || '';
                    document.getElementById('twitch-channel-name').value = config.channelName || '';
                    document.getElementById('twitch-redeem-title').value = config.redeemTitle || '';
                    document.getElementById('twitch-song-delay').value = config.songDelaySeconds || 0;
                }
            } catch (error) {
                console.error('Error fetching twitch config:', error);
            }
        }

        document.getElementById('twitch-config-form').onsubmit = async (e) => {
            e.preventDefault();
            const key = getApiKey();
            const config = {
                clientId: document.getElementById('twitch-client-id').value,
                clientSecret: document.getElementById('twitch-client-secret').value,
                accessToken: document.getElementById('twitch-access-token').value,
                channelName: document.getElementById('twitch-channel-name').value,
                redeemTitle: document.getElementById('twitch-redeem-title').value,
                songDelaySeconds: parseInt(document.getElementById('twitch-song-delay').value)
            };

            try {
                const response = await fetch('/api/twitch-config', {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-API-Key': key
                    },
                    body: JSON.stringify(config)
                });
                if (response.status === 401) return logout();
                if (response.ok) {
                    alert('Twitch configuration updated!');
                    fetchTwitchConfig();
                } else {
                    alert('Failed to update Twitch configuration.');
                }
            } catch (error) {
                console.error('Error updating twitch config:', error);
            }
        };

        async function playSong(id) {
            const key = getApiKey();
            try {
                const response = await fetch(`/api/songs/${id}/play`, { 
                    method: 'POST',
                    headers: { 'X-API-Key': key }
                });
                if (response.status === 401) return logout();
                if (response.ok) {
                    alert('Song queued for playing!');
                } else {
                    alert('Failed to play song.');
                }
            } catch (error) {
                console.error('Error playing song:', error);
            }
        }

        async function deleteSong(id) {
            if (!confirm('Are you sure you want to delete this song?')) return;
            const key = getApiKey();
            try {
                const response = await fetch(`/api/songs/${id}`, { 
                    method: 'DELETE',
                    headers: { 'X-API-Key': key }
                });
                if (response.status === 401) return logout();
                if (response.ok) {
                    fetchSongs();
                } else {
                    alert('Failed to delete song.');
                }
            } catch (error) {
                console.error('Error deleting song:', error);
            }
        }

        document.getElementById('add-song-form').onsubmit = async (e) => {
            e.preventDefault();
            const key = getApiKey();
            const song = {
                name: document.getElementById('song-name').value,
                artist: document.getElementById('song-artist').value,
                url: document.getElementById('song-url').value,
                redeemName: document.getElementById('song-redeem').value
            };

            try {
                const response = await fetch('/api/songs', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-API-Key': key
                    },
                    body: JSON.stringify(song)
                });
                if (response.status === 401) return logout();
                if (response.ok) {
                    document.getElementById('add-song-form').reset();
                    document.getElementById('song-redeem').value = 'Play Random Song';
                    fetchSongs();
                } else {
                    alert('Failed to add song.');
                }
            } catch (error) {
                console.error('Error adding song:', error);
            }
        };

        // Initial load
        checkAuth();
        if (getApiKey()) {
            refreshAllHealth();
            fetchSongs();
            fetchTwitchConfig();
            fetchRecentRedeems();
            connectWebSocket();
        }
    </script>
</body>
</html>
