<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Bot Admin UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; height: 100vh; display: flex; flex-direction: column; }
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #343a40;
            color: white;
            z-index: 1030;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }
        .status-item { margin-right: 20px; font-size: 0.9rem; }
        .status-label { color: #adb5bd; margin-right: 5px; }
        .status-value { font-weight: bold; }
        .status-online { color: #28a745; }
        .status-offline { color: #dc3545; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .left-panel { flex: 7; overflow-y: auto; padding: 20px; border-right: 1px solid #dee2e6; }
        .right-panel { flex: 3; overflow-y: auto; padding: 20px; background-color: #fff; }

        .card { margin-bottom: 20px; }
        #redeem-log {
            font-family: monospace;
            font-size: 0.85rem;
        }
        .redeem-entry {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f1f3f5;
        }
        .redeem-time { color: #6c757d; font-size: 0.75rem; }
        .redeem-user { font-weight: bold; color: #0d6efd; }
        .redeem-reward { color: #198754; }

        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div class="auth-card">
            <h3 class="mb-3">Admin Access</h3>
            <div class="mb-3">
                <label class="form-label">API Key</label>
                <input type="password" class="form-control" id="api-key-input">
            </div>
            <button class="btn btn-primary w-100" onclick="saveApiKey()">Login</button>
        </div>
    </div>

    <div class="status-bar">
        <div class="d-flex align-items-center">
            <span class="h5 mb-0 me-4">Twitch Bot Admin</span>
            <div class="status-item">
                <span class="status-label">Stream:</span>
                <span id="stat-stream" class="status-value status-offline">OFFLINE</span>
            </div>
            <div class="status-item">
                <span class="status-label">Twitch:</span>
                <span id="stat-twitch" class="status-value status-offline">DISCONNECTED</span>
            </div>
            <div class="status-item">
                <span class="status-label">Queue:</span>
                <span id="stat-queue" class="status-value">0</span>
            </div>
            <div class="status-item">
                <span class="status-label">Playing:</span>
                <span id="stat-playing" class="status-value text-info">None</span>
            </div>
        </div>
        <div>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main-container">
        <div class="left-panel">
            <div class="card">
                <div class="card-header">Add New Song</div>
                <div class="card-body">
                    <form id="add-song-form">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label small">Song Name</label>
                                <input type="text" class="form-control form-control-sm" id="song-name" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Artist</label>
                                <input type="text" class="form-control form-control-sm" id="song-artist" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Redeem Name</label>
                                <input type="text" class="form-control form-control-sm" id="song-redeem" value="Play Random Song" required>
                            </div>
                            <div class="col-md-9">
                                <label class="form-label small">Audio URL</label>
                                <input type="url" class="form-control form-control-sm" id="song-url" placeholder="https://example.com/audio.mp3" required>
                            </div>
                            <div class="col-md-3 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary btn-sm w-100">Add Song</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    Songs Database
                    <button class="btn btn-sm btn-outline-secondary" onclick="fetchSongs()">Refresh</button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Artist</th>
                                    <th>Redeem</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="songs-table-body">
                                <!-- Songs loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Twitch Configuration</div>
                <div class="card-body">
                    <form id="twitch-config-form">
                        <div class="row g-2">
                            <div class="col-md-4">
                                <label class="form-label small">Client ID</label>
                                <input type="password" class="form-control form-control-sm" id="twitch-client-id">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Client Secret</label>
                                <input type="password" class="form-control form-control-sm" id="twitch-client-secret">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Access Token</label>
                                <input type="password" class="form-control form-control-sm" id="twitch-access-token">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Channel Name</label>
                                <input type="text" class="form-control form-control-sm" id="twitch-channel-name">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Redeem Title</label>
                                <input type="text" class="form-control form-control-sm" id="twitch-redeem-title">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small">Delay (s)</label>
                                <input type="number" class="form-control form-control-sm" id="twitch-song-delay">
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button type="submit" class="btn btn-sm btn-primary w-100">Update</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <h5 class="mb-3">Event Log</h5>
            <div id="redeem-log">
                <!-- Redeems added here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script>
        let stompClient = null;

        function connectWebSocket() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/topic/redeems', function (response) {
                    addRedeemToLog(JSON.parse(response.body));
                });
                stompClient.subscribe('/topic/queue-size', function (response) {
                    updateQueueSizeDisplay(JSON.parse(response.body));
                });
                stompClient.subscribe('/topic/stream-status', function (response) {
                    updateStreamStatusDisplay(JSON.parse(response.body));
                });
                stompClient.subscribe('/topic/connection-status', function (response) {
                    updateConnectionStatusDisplay(JSON.parse(response.body));
                });
                stompClient.subscribe('/topic/current-song', function (response) {
                    updateCurrentSongDisplay(JSON.parse(response.body));
                });
            }, function (error) {
                console.error('WebSocket Error: ' + error);
                setTimeout(connectWebSocket, 5000);
            });
        }

        function addRedeemToLog(redeem, prepend = true) {
            const logEl = document.getElementById('redeem-log');
            const entry = document.createElement('div');
            entry.className = 'redeem-entry';
            const time = new Date(redeem.timestamp).toLocaleTimeString();
            entry.innerHTML = `
                <div class="redeem-time">${time}</div>
                <div><span class="redeem-user">${redeem.user}</span>: <span class="redeem-reward">${redeem.rewardTitle}</span></div>
            `;
            if (prepend) {
                logEl.insertBefore(entry, logEl.firstChild);
            } else {
                logEl.appendChild(entry);
            }
        }

        async function fetchRecentRedeems() {
            const key = getApiKey();
            if (!key) return;
            try {
                const response = await fetch('/api/twitch-config/redeems', { headers: { 'X-API-Key': key } });
                if (response.status === 401) return logout();
                const redeems = await response.json();
                const logEl = document.getElementById('redeem-log');
                logEl.innerHTML = '';
                redeems.reverse().forEach(redeem => addRedeemToLog(redeem, false));
            } catch (error) { console.error('Error fetching redeems:', error); }
        }

        function getApiKey() { return localStorage.getItem('twitch_bot_api_key') || ''; }
        function saveApiKey() {
            const key = document.getElementById('api-key-input').value;
            if (key) {
                localStorage.setItem('twitch_bot_api_key', key);
                location.reload();
            }
        }
        function logout() {
            localStorage.removeItem('twitch_bot_api_key');
            location.reload();
        }
        function checkAuth() {
            const key = getApiKey();
            document.getElementById('auth-overlay').style.display = key ? 'none' : 'flex';
        }

        function updateQueueSizeDisplay(size) {
            document.getElementById('stat-queue').innerText = size;
        }

        function updateStreamStatusDisplay(isOnline) {
            const el = document.getElementById('stat-stream');
            el.innerText = isOnline ? 'ONLINE' : 'OFFLINE';
            el.className = 'status-value ' + (isOnline ? 'status-online' : 'status-offline');
        }

        function updateConnectionStatusDisplay(isConnected) {
            const el = document.getElementById('stat-twitch');
            el.innerText = isConnected ? 'CONNECTED' : 'DISCONNECTED';
            el.className = 'status-value ' + (isConnected ? 'status-online' : 'status-offline');
        }

        function updateCurrentSongDisplay(song) {
            const el = document.getElementById('stat-playing');
            if (song) {
                el.innerText = `${song.name} - ${song.artist}`;
                el.classList.add('text-info');
            } else {
                el.innerText = 'None';
                el.classList.remove('text-info');
            }
        }

        async function refreshInitialStatus() {
            const key = getApiKey();
            if (!key) return;
            try {
                // Stream status
                let res = await fetch('/api/twitch-config/status', { headers: { 'X-API-Key': key } });
                if (res.ok) updateStreamStatusDisplay(await res.json());

                // Connection status
                res = await fetch('/api/twitch-config/connection', { headers: { 'X-API-Key': key } });
                if (res.ok) updateConnectionStatusDisplay(await res.json());

                // Queue size
                res = await fetch('/api/songs/queue-size', { headers: { 'X-API-Key': key } });
                if (res.ok) updateQueueSizeDisplay(await res.json());

                // Current song
                res = await fetch('/api/songs/current', { headers: { 'X-API-Key': key } });
                if (res.status === 200) updateCurrentSongDisplay(await res.json());
                else updateCurrentSongDisplay(null);

            } catch (e) { console.error('Error refreshing status:', e); }
        }

        async function fetchSongs() {
            const key = getApiKey();
            if (!key) return;
            try {
                const response = await fetch('/api/songs', { headers: { 'X-API-Key': key } });
                if (response.status === 401) return logout();
                const songs = await response.json();
                const tbody = document.getElementById('songs-table-body');
                tbody.innerHTML = '';
                songs.forEach(song => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${song.id}</td>
                        <td>${song.name}</td>
                        <td>${song.artist}</td>
                        <td>${song.redeemName}</td>
                        <td>
                            <button class="btn btn-sm btn-success me-1" onclick="playSong(${song.id})">Play</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteSong(${song.id})">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) { console.error('Error fetching songs:', error); }
        }

        async function fetchTwitchConfig() {
            const key = getApiKey();
            if (!key) return;
            try {
                const response = await fetch('/api/twitch-config', { headers: { 'X-API-Key': key } });
                if (response.status === 401) return logout();
                if (response.ok) {
                    const config = await response.json();
                    document.getElementById('twitch-client-id').value = config.clientId || '';
                    document.getElementById('twitch-client-secret').value = config.clientSecret || '';
                    document.getElementById('twitch-access-token').value = config.accessToken || '';
                    document.getElementById('twitch-channel-name').value = config.channelName || '';
                    document.getElementById('twitch-redeem-title').value = config.redeemTitle || '';
                    document.getElementById('twitch-song-delay').value = config.songDelaySeconds || 0;
                }
            } catch (error) { console.error('Error fetching config:', error); }
        }

        document.getElementById('twitch-config-form').onsubmit = async (e) => {
            e.preventDefault();
            const key = getApiKey();
            const config = {
                clientId: document.getElementById('twitch-client-id').value,
                clientSecret: document.getElementById('twitch-client-secret').value,
                accessToken: document.getElementById('twitch-access-token').value,
                channelName: document.getElementById('twitch-channel-name').value,
                redeemTitle: document.getElementById('twitch-redeem-title').value,
                songDelaySeconds: parseInt(document.getElementById('twitch-song-delay').value)
            };
            try {
                const response = await fetch('/api/twitch-config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': key },
                    body: JSON.stringify(config)
                });
                if (response.ok) { alert('Config updated!'); fetchTwitchConfig(); }
            } catch (error) { console.error('Error updating config:', error); }
        };

        async function playSong(id) {
            const key = getApiKey();
            try {
                const response = await fetch(`/api/songs/${id}/play`, { method: 'POST', headers: { 'X-API-Key': key } });
                if (response.ok) { /* WebSocket will update queue size */ }
                else { alert(await response.text()); }
            } catch (error) { console.error('Error playing song:', error); }
        }

        async function deleteSong(id) {
            if (!confirm('Are you sure?')) return;
            const key = getApiKey();
            try {
                const response = await fetch(`/api/songs/${id}`, { method: 'DELETE', headers: { 'X-API-Key': key } });
                if (response.ok) fetchSongs();
            } catch (error) { console.error('Error deleting song:', error); }
        }

        document.getElementById('add-song-form').onsubmit = async (e) => {
            e.preventDefault();
            const key = getApiKey();
            const song = {
                name: document.getElementById('song-name').value,
                artist: document.getElementById('song-artist').value,
                url: document.getElementById('song-url').value,
                redeemName: document.getElementById('song-redeem').value
            };
            try {
                const response = await fetch('/api/songs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': key },
                    body: JSON.stringify(song)
                });
                if (response.ok) {
                    document.getElementById('add-song-form').reset();
                    document.getElementById('song-redeem').value = 'Play Random Song';
                    fetchSongs();
                }
            } catch (error) { console.error('Error adding song:', error); }
        };

        checkAuth();
        if (getApiKey()) {
            refreshInitialStatus();
            fetchSongs();
            fetchTwitchConfig();
            fetchRecentRedeems();
            connectWebSocket();
        }
    </script>
</body>
</html>
