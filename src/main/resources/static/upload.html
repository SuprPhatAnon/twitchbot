<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Song Bot - Upload Song</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; padding: 20px; }
        .card { background-color: #1e1e1e; color: #e0e0e0; border: 1px solid #333; }
        .form-control, .form-control:focus { background-color: #2c2c2c; border-color: #444; color: #e0e0e0; }
        .btn-primary { background-color: #9146FF; border-color: #9146FF; }
        .btn-primary:hover { background-color: #772ce8; border-color: #772ce8; }
        #status-message { margin-top: 20px; }
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-dark">
                        <h3 class="mb-0">Upload Song</h3>
                    </div>
                    <div class="card-body">
                        <form id="upload-form">
                            <div class="mb-3">
                                <label for="song-name" class="form-label">Song Name</label>
                                <input type="text" class="form-control" id="song-name" placeholder="e.g. Blinding Lights" required>
                            </div>
                            <div class="mb-3">
                                <label for="song-artist" class="form-label">Artist</label>
                                <input type="text" class="form-control" id="song-artist" placeholder="e.g. The Weeknd" required>
                            </div>
                            <div class="mb-3">
                                <label for="song-file" class="form-label">Song File (MP3)</label>
                                <input type="file" class="form-control" id="song-file" accept=".mp3,audio/mpeg" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary" id="submit-btn">Upload Song</button>
                            </div>
                        </form>
                        <div id="status-message"></div>
                    </div>
                </div>
                <div class="mt-3 text-center">
                    <a href="/account.html" class="text-decoration-none me-3" style="color: #9146FF;">Account</a>
                    <a href="/admin.html" class="text-decoration-none" style="color: #9146FF;">Go to Admin Dashboard</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getApiKey() {
            return '';
        }

        function handleAuthError() {
            window.location.href = '/login.html';
        }

        function logout() {
            window.location.href = '/logout';
        }

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('song-name').value;
            const artist = document.getElementById('song-artist').value;
            const fileInput = document.getElementById('song-file');
            const statusDiv = document.getElementById('status-message');
            const submitBtn = document.getElementById('submit-btn');

            if (fileInput.files.length === 0) {
                showStatus('Please select a file.', 'danger');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('name', name);
            formData.append('artist', artist);

            submitBtn.disabled = true;
            submitBtn.textContent = 'Uploading...';
            statusDiv.innerHTML = '';

            try {
                const response = await fetch('/api/songs/upload', {
                    method: 'POST',
                    headers: { 'X-API-KEY': getApiKey() },
                    body: formData
                });

                if (response.status === 401 || response.status === 403) {
                    handleAuthError();
                    return;
                }

                if (response.ok) {
                    const result = await response.json();
                    showStatus(`Successfully uploaded: ${result.name} by ${result.artist}`, 'success');
                    document.getElementById('song-name').value = '';
                    document.getElementById('song-artist').value = '';
                    fileInput.value = '';
                } else {
                    const errorText = await response.text();
                    showStatus(`Upload failed: ${errorText}`, 'danger');
                }
            } catch (error) {
                showStatus(`An error occurred: ${error.message}`, 'danger');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Upload Song';
            }
        });

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-alert="close" aria-label="Close"></button>
                </div>
            `;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
