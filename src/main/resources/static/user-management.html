<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Twitch Song Overlay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/common.css" rel="stylesheet">
    <style>
        .container { max-width: 800px; margin-top: 20px; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); }
        .modal-content { background-color: #fff; margin: 10% auto; padding: 20px; border-radius: 8px; width: 400px; }
        [data-bs-theme="dark"] .modal-content { background-color: #1e1e1e; color: #eee; border: 1px solid #333; }
        .btn-small { padding: 4px 8px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="status-bar">
        <div class="d-flex align-items-center">
            <span class="h5 mb-0 me-4">Twitch Bot Users</span>
        </div>
        <div>
            <button id="theme-toggle" class="btn btn-outline-light btn-sm me-2" onclick="toggleTheme()">🌙</button>
            <a href="/admin.html" class="btn btn-outline-light btn-sm me-2" data-role="ROLE_ADMIN">Admin</a>
            <a href="/streamer.html" class="btn btn-outline-light btn-sm me-2" data-role="ROLE_STREAMER">Streamer</a>
            <a href="/song-management.html" class="btn btn-outline-light btn-sm me-2" data-role="ROLE_UPLOAD">Songs</a>
            <a href="/status.html" class="btn btn-outline-light btn-sm me-2">Status</a>
            <a href="/account.html" class="btn btn-outline-light btn-sm me-2">Account</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>User Management</h1>
            <button class="btn btn-primary" onclick="openModal()">Add New User</button>
        </div>
        
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0" id="userTable">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Roles</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add User</h2>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password (leave blank to keep current when editing)</label>
                    <input type="password" id="password">
                </div>
                <div class="form-group">
                    <label>Roles</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="roles" value="ROLE_UPLOAD" style="width: auto;"> Upload
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="roles" value="ROLE_STREAMER" style="width: auto;"> Streamer
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="roles" value="ROLE_ADMIN" style="width: auto;"> Admin
                        </label>
                    </div>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        const userTableBody = document.querySelector('#userTable tbody');
        const userModal = document.getElementById('userModal');
        const userForm = document.getElementById('userForm');

        async function fetchUsers() {
            try {
                const res = await fetch('/api/users');
                if (res.status === 403 || res.status === 401) {
                    return;
                }
                const users = await res.json();
                userTableBody.innerHTML = '';
                users.forEach(user => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${user.username}</td>
                        <td>${user.roles.join(', ')}</td>
                        <td>
                            <button class="btn btn-primary btn-small" onclick='editUser(${JSON.stringify(user)})'>Edit</button>
                            <button class="btn btn-danger btn-small" onclick="deleteUser(${user.id})">Delete</button>
                        </td>
                    `;
                    userTableBody.appendChild(tr);
                });
            } catch (err) {
                console.error('Error fetching users:', err);
            }
        }

        function openModal(user = null) {
            userModal.style.display = 'block';
            if (user) {
                document.getElementById('modalTitle').innerText = 'Edit User';
                document.getElementById('userId').value = user.id;
                document.getElementById('username').value = user.username;
                document.getElementById('password').value = '';
                document.querySelectorAll('input[name="roles"]').forEach(cb => {
                    cb.checked = user.roles.includes(cb.value);
                });
            } else {
                document.getElementById('modalTitle').innerText = 'Add User';
                document.getElementById('userId').value = '';
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                document.querySelectorAll('input[name="roles"]').forEach(cb => cb.checked = false);
            }
        }

        function closeModal() {
            userModal.style.display = 'none';
        }

        function editUser(user) {
            openModal(user);
        }

        async function deleteUser(id) {
            if (confirm('Are you sure you want to delete this user?')) {
                const res = await fetch(`/api/users/${id}`, { 
                    method: 'DELETE'
                });
                if (res.status === 401 || res.status === 403) {
                    return;
                }
                fetchUsers();
            }
        }

        userForm.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const roles = Array.from(document.querySelectorAll('input[name="roles"]:checked')).map(cb => cb.value);

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/users/${id}` : '/api/users';

            const res = await fetch(url, {
                method,
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password, roles })
            });

            if (res.status === 401 || res.status === 403) {
                return;
            }

            if (res.ok) {
                closeModal();
                fetchUsers();
            } else {
                alert(await res.text());
            }
        };

        fetchUsers();
    </script>
</body>
</html>
