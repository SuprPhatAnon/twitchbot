<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Twitch Song Overlay</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #eee; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 8px; max-height: 90vh; display: flex; flex-direction: column; }
        h1 { color: #9146ff; }
        .table-container { overflow-y: auto; flex: 1; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #2a2a2a; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; }
        input, select { width: 100%; padding: 0.5rem; border: 1px solid #333; border-radius: 4px; background: #2a2a2a; color: #eee; box-sizing: border-box; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #9146ff; color: white; }
        .btn-danger { background: #ff5555; color: white; }
        .btn-small { padding: 4px 8px; font-size: 0.8rem; }
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); }
        .modal-content { background-color: #1e1e1e; margin: 10% auto; padding: 20px; border-radius: 8px; width: 400px; }
        .nav { margin-bottom: 20px; }
        .nav a { color: #9146ff; text-decoration: none; margin-right: 15px; }
        .nav a:hover { text-decoration: underline; }
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
        }
        .text-muted { color: #888; }
        .small { font-size: 0.85rem; }
        .mb-3 { margin-bottom: 1rem; }
        .mb-4 { margin-bottom: 1.5rem; }
        .d-grid { display: grid; }
        .gap-2 { gap: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/account.html">Account</a>
            <a href="/admin.html">← Back to Admin</a>
        </div>
        <h1>User Management</h1>
        <button class="btn btn-primary" onclick="openModal()">Add New User</button>
        
        <div class="table-container">
            <table id="userTable">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Roles</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add User</h2>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password (leave blank to keep current when editing)</label>
                    <input type="password" id="password">
                </div>
                <div class="form-group">
                    <label>Roles</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="roles" value="ROLE_UPLOAD" style="width: auto;"> Upload
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="roles" value="ROLE_STREAMER" style="width: auto;"> Streamer
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="roles" value="ROLE_ADMIN" style="width: auto;"> Admin
                        </label>
                    </div>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function getApiKey() {
            return '';
        }

        function handleAuthError() {
            window.location.href = '/login.html';
        }

        function logout() {
            window.location.href = '/logout';
        }

        const userTableBody = document.querySelector('#userTable tbody');
        const userModal = document.getElementById('userModal');
        const userForm = document.getElementById('userForm');

        async function fetchUsers() {
            try {
                const res = await fetch('/api/users', {
                    headers: { 'X-API-KEY': getApiKey() }
                });
                if (res.status === 403 || res.status === 401) {
                    handleAuthError();
                    return;
                }
                const users = await res.json();
                userTableBody.innerHTML = '';
                users.forEach(user => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${user.username}</td>
                        <td>${user.roles.join(', ')}</td>
                        <td>
                            <button class="btn btn-primary btn-small" onclick='editUser(${JSON.stringify(user)})'>Edit</button>
                            <button class="btn btn-danger btn-small" onclick="deleteUser(${user.id})">Delete</button>
                        </td>
                    `;
                    userTableBody.appendChild(tr);
                });
            } catch (err) {
                console.error('Error fetching users:', err);
            }
        }

        function openModal(user = null) {
            userModal.style.display = 'block';
            if (user) {
                document.getElementById('modalTitle').innerText = 'Edit User';
                document.getElementById('userId').value = user.id;
                document.getElementById('username').value = user.username;
                document.getElementById('password').value = '';
                document.querySelectorAll('input[name="roles"]').forEach(cb => {
                    cb.checked = user.roles.includes(cb.value);
                });
            } else {
                document.getElementById('modalTitle').innerText = 'Add User';
                document.getElementById('userId').value = '';
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                document.querySelectorAll('input[name="roles"]').forEach(cb => cb.checked = false);
            }
        }

        function closeModal() {
            userModal.style.display = 'none';
        }

        function editUser(user) {
            openModal(user);
        }

        async function deleteUser(id) {
            if (confirm('Are you sure you want to delete this user?')) {
                const res = await fetch(`/api/users/${id}`, { 
                    method: 'DELETE',
                    headers: { 'X-API-KEY': getApiKey() }
                });
                if (res.status === 401 || res.status === 403) {
                    handleAuthError();
                    return;
                }
                fetchUsers();
            }
        }

        userForm.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const roles = Array.from(document.querySelectorAll('input[name="roles"]:checked')).map(cb => cb.value);

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/users/${id}` : '/api/users';

            const res = await fetch(url, {
                method,
                headers: { 
                    'Content-Type': 'application/json',
                    'X-API-KEY': getApiKey()
                },
                body: JSON.stringify({ username, password, roles })
            });

            if (res.status === 401 || res.status === 403) {
                handleAuthError();
                return;
            }

            if (res.ok) {
                closeModal();
                fetchUsers();
            } else {
                alert(await res.text());
            }
        };

        checkAuth();
        fetchUsers();
    </script>
</body>
</html>
