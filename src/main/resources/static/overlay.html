<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Twitch Song Overlay</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-shadow: 2px 2px 4px #000000;
        }
        #song-display {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 5px;
            border-left: 5px solid #6441a5; /* Twitch Purple */
            display: none;
            align-items: center;
            gap: 15px;
            z-index: 100;
        }
        #song-art {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            display: none;
        }
        .rain-item {
            position: absolute;
            top: -100px;
            font-size: 2rem;
            user-select: none;
            pointer-events: none;
            z-index: 50;
            animation: fall linear forwards;
        }
        .rain-image {
            max-width: 50px;
            max-height: 50px;
        }
        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div id="song-display">
        <img id="song-art" src="" alt="Album Art">
        <div>
            Now Playing: <span id="song-title"></span>
        </div>
    </div>
    <audio id="audio-player"></audio>

    <script>
        const songDisplay = document.getElementById('song-display');
        const songTitle = document.getElementById('song-title');
        const songArt = document.getElementById('song-art');
        const audioPlayer = document.getElementById('audio-player');

        let stompClient = null;
        let reconnectDelay = 1000;
        const maxReconnectDelay = 30000;
        let currentSong = null;

        function connect() {
            console.log("Connecting to /ws...");
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            // stompClient.debug = null; // Disable debug logging to console
            
            stompClient.connect({}, function (frame) {
                console.log('Connected: ' + frame);
                window.connectedAt = new Date().getTime();
                reconnectDelay = 1000; // Reset delay on successful connection
                
                // Request current state immediately after connecting
                stompClient.send("/app/request-state", {}, {});
                
                stompClient.subscribe('/topic/play', function (message) {
                    const song = JSON.parse(message.body);
                    playSong(song);
                });

                stompClient.subscribe('/topic/current-song', function (message) {
                    console.log("[DEBUG_LOG] Received message on /topic/current-song:", message.body);
                    const song = (message.body && message.body !== 'null' && message.body !== '') ? JSON.parse(message.body) : null;
                    if (!song) {
                        console.log("[DEBUG_LOG] Clearing display and stopping audio because song is null (queue cleared)");
                        stopPlayback();
                    } else {
                        // Current song is playing, update display (case where overlay reloads while song is active)
                        updateDisplay(song);
                    }
                });

                stompClient.subscribe('/topic/pause-status', function (message) {
                    const isPaused = JSON.parse(message.body);
                    handlePauseStatus(isPaused);
                });

                stompClient.subscribe('/topic/rain', function (message) {
                    const rainEffect = JSON.parse(message.body);
                    triggerRainEffect(rainEffect);
                });
            }, function (error) {
                console.log('STOMP error: ' + error + '. Retrying in ' + (reconnectDelay / 1000) + 's');
                setTimeout(connect, reconnectDelay);
                // Exponential backoff
                reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
            });
        }

        function playSong(song) {
            updateDisplay(song);
            audioPlayer.src = song.url;
            
            const playPromise = audioPlayer.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.error("Playback failed:", error);
                    // If playback fails (e.g. autoplay blocked or 404), notify server after 3 seconds
                    // to avoid stalling the queue completely.
                    // setTimeout(notifySongFinished, 3000); // Logic moved to server-side duration
                });
            }

            audioPlayer.onended = () => {
                clearDisplay();
                // notifySongFinished(); // Logic moved to server-side duration
            };
            audioPlayer.onerror = () => {
                if (audioPlayer.src && !audioPlayer.src.endsWith('/null') && !audioPlayer.src.endsWith('undefined')) {
                    console.error("Audio error occurred for src:", audioPlayer.src);
                    clearDisplay();
                    // setTimeout(notifySongFinished, 2000); // Logic moved to server-side duration
                } else {
                    console.log("[DEBUG_LOG] Audio error ignored for empty/null src");
                }
            };
        }

        function updateDisplay(song) {
            currentSong = song;
            if (!song) {
                clearDisplay();
                return;
            }
            songTitle.innerText = song.name + ' - ' + song.artist;
            if (song.coverArt) {
                songArt.src = song.coverArt;
                songArt.style.display = 'block';
            } else {
                songArt.src = '';
                songArt.style.display = 'none';
            }
            checkVisibility();
        }

        function checkVisibility() {
            if (!currentSong) {
                songDisplay.style.display = 'none';
                return;
            }

            const currentTime = audioPlayer.currentTime;
            const duration = currentSong.durationSeconds || audioPlayer.duration;

            if (!duration || isNaN(duration)) {
                // If duration is not available yet, show it anyway for now
                songDisplay.style.display = 'flex';
                return;
            }

            const showStartTime = 5;
            const showEndTime = duration - 5;

            if (currentTime <= showStartTime || currentTime >= showEndTime) {
                songDisplay.style.display = 'flex';
            } else {
                songDisplay.style.display = 'none';
            }
        }

        audioPlayer.ontimeupdate = () => {
            checkVisibility();
        };

        function clearDisplay() {
            currentSong = null;
            songDisplay.style.display = 'none';
            songTitle.innerText = '';
            songArt.src = '';
            songArt.style.display = 'none';
        }

        function stopPlayback() {
            audioPlayer.pause();
            audioPlayer.src = "";
            clearDisplay();
        }

        function handlePauseStatus(isPaused) {
            if (isPaused) {
                audioPlayer.pause();
            } else if (audioPlayer.src && audioPlayer.src !== "" && !audioPlayer.src.endsWith('/null')) {
                audioPlayer.play().catch(error => {
                    console.error("Failed to resume playback:", error);
                });
            }
        }

        function triggerRainEffect(rainEffect) {
            const content = rainEffect.content;
            const duration = rainEffect.duration || 5000;
            const isUrl = content.startsWith('http');
            const startTime = Date.now();

            const interval = setInterval(() => {
                if (Date.now() - startTime > duration) {
                    clearInterval(interval);
                    return;
                }

                createRainItem(content, isUrl);
            }, 100);
        }

        function createRainItem(content, isUrl) {
            const item = document.createElement('div');
            item.className = 'rain-item';
            
            if (isUrl) {
                const img = document.createElement('img');
                img.src = content;
                img.className = 'rain-image';
                item.appendChild(img);
            } else {
                item.innerText = content;
            }

            const startLeft = Math.random() * 100;
            const fallDuration = 2 + Math.random() * 3; // 2-5 seconds to fall
            
            item.style.left = startLeft + 'vw';
            item.style.animationDuration = fallDuration + 's';
            
            document.body.appendChild(item);
            
            // Remove element after it finishes falling
            setTimeout(() => {
                item.remove();
            }, fallDuration * 1000 + 100);
        }

        function notifySongFinished() {
            if (stompClient && stompClient.connected) {
                stompClient.send("/app/song-finished", {}, JSON.stringify({status: "finished"}));
            }
        }

        connect();
    </script>
</body>
</html>
