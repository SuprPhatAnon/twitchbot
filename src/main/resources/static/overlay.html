<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Twitch Song Overlay</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-shadow: 2px 2px 4px #000000;
        }
        #song-display {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 5px;
            border-left: 5px solid #6441a5; /* Twitch Purple */
            display: none;
            align-items: center;
            gap: 15px;
            z-index: 100;
        }
        #song-art {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            display: none;
        }
        .rain-item {
            position: absolute;
            top: -100px;
            font-size: 2rem;
            user-select: none;
            pointer-events: none;
            z-index: 50;
            animation: fall linear forwards;
        }
        .rain-image {
            max-width: 50px;
            max-height: 50px;
        }
        .placement-effect {
            position: absolute;
            z-index: 60;
            pointer-events: none;
        }
        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div id="song-display">
        <img id="song-art" src="" alt="Album Art">
        <div>
            Now Playing: <span id="song-title"></span>
        </div>
    </div>
    <audio id="audio-player"></audio>

    <script>
        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        const songDisplay = document.getElementById('song-display');
        const songTitle = document.getElementById('song-title');
        const songArt = document.getElementById('song-art');
        const audioPlayer = document.getElementById('audio-player');

        let stompClient = null;
        let reconnectDelay = 1000;
        const maxReconnectDelay = 30000;
        let currentSong = null;

        function connect() {
            console.log("WebSocket: Initiating connection to " + window.location.origin + "/ws");
            const socket = new SockJS(window.location.origin + '/ws');
            stompClient = Stomp.over(socket);
            stompClient.heartbeat.outgoing = 10000;
            stompClient.heartbeat.incoming = 10000;
            stompClient.debug = function(str) {
                console.log('STOMP Debug: ' + str);
            };
            
            stompClient.connect({}, function (frame) {
                console.log('WebSocket: Connected successfully. Frame: ' + frame);
                window.connectedAt = new Date().getTime();
                reconnectDelay = 1000; // Reset delay on successful connection
                
                // Request current state immediately after connecting
                console.log('WebSocket: Requesting initial state...');
                stompClient.send("/app/request-state", {}, {});
                
                stompClient.subscribe('/topic/play', function (message) {
                    try {
                        const body = message.body;
                        if (body && body.length > 1000) {
                            console.log('WebSocket: Received large play command (length: ' + body.length + ')');
                        } else {
                            console.log('WebSocket: Received play command: ' + body);
                        }
                        const song = (body && body !== 'null' && body !== '') ? JSON.parse(body) : null;
                        if (song) {
                            console.log('WebSocket: Received play command for song: ' + song.name);
                            playSong(song);
                        }
                    } catch (error) {
                        console.error('Error parsing play command:', error);
                    }
                });

                stompClient.subscribe('/topic/current-song', function (message) {
                    try {
                        const body = message.body;
                        if (body && body.length > 1000) {
                            console.log('WebSocket: Received large current song update (length: ' + body.length + ')');
                        } else {
                            console.log('WebSocket: Received current song update: ' + body);
                        }
                        const song = (body && body !== 'null' && body !== '') ? JSON.parse(body) : null;
                        console.log('WebSocket: Received current song update: ' + (song ? song.name : 'null'));
                        if (song === null) {
                            stopPlayback();
                        } else {
                            updateDisplay(song);
                            // If we received a current song but nothing is playing, play it
                            if (audioPlayer && (audioPlayer.paused || !audioPlayer.src || audioPlayer.src.endsWith('/null') || audioPlayer.src.endsWith('undefined'))) {
                                console.log('WebSocket: Auto-playing current song...');
                                playSong(song);
                            }
                        }
                    } catch (error) {
                        console.error('Error parsing current song update:', error);
                    }
                });

                stompClient.subscribe('/topic/pause-status', function (message) {
                    const isPaused = JSON.parse(message.body);
                    console.log('WebSocket: Received pause status update: ' + (isPaused ? 'PAUSED' : 'PLAYING'));
                    handlePauseStatus(isPaused);
                });

                stompClient.subscribe('/topic/rain', function (message) {
                    console.log('WebSocket: Received rain effect event');
                    const rainEffect = JSON.parse(message.body);
                    triggerRainEffect(rainEffect);
                });

                stompClient.subscribe('/topic/placement-effect', function (message) {
                    console.log('WebSocket: Received placement effect event');
                    const placementEffect = JSON.parse(message.body);
                    triggerPlacementEffect(placementEffect);
                });
            }, function (error) {
                console.error('WebSocket Error: ', error);
                console.log('WebSocket: Attempting to reconnect in ' + (reconnectDelay / 1000) + 's...');
                setTimeout(connect, reconnectDelay);
                // Exponential backoff
                reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
            });
        }

        function playSong(song) {
            if (!song) return;
            updateDisplay(song);
            
            let url = song.url;
            
            if (audioPlayer) {
                // Ensure the URL starts with / if it doesn't and is not absolute
                if (url && !url.startsWith('http') && !url.startsWith('/')) {
                    url = '/' + url;
                }
                audioPlayer.src = url || '';
                
                const playPromise = audioPlayer.play();
                
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.error("Playback failed:", error);
                    });
                }

                audioPlayer.onended = () => {
                    clearDisplay();
                };
                audioPlayer.onerror = () => {
                    if (audioPlayer.src && !audioPlayer.src.endsWith('/null') && !audioPlayer.src.endsWith('undefined')) {
                        clearDisplay();
                    }
                };
            }
        }

        function updateDisplay(song) {
            currentSong = song;
            if (!song) {
                clearDisplay();
                return;
            }
            const songDisplay = document.getElementById('song-display');
            const songTitle = document.getElementById('song-title');
            const songArt = document.getElementById('song-art');

            if (songTitle) {
                songTitle.textContent = (song.name || '') + ' - ' + (song.artist || '');
            }
            if (songArt) {
                if (song.coverArt) {
                    let artUrl = song.coverArt;
                    if (artUrl && !artUrl.startsWith('http') && !artUrl.startsWith('data:') && !artUrl.startsWith('/')) {
                        artUrl = '/' + artUrl;
                    }
                    songArt.src = artUrl;
                    songArt.style.display = 'block';
                } else {
                    songArt.src = '';
                    songArt.style.display = 'none';
                }
            }
            checkVisibility();
        }

        function checkVisibility() {
            const songDisplay = document.getElementById('song-display');
            const audioPlayer = document.getElementById('audio-player');
            if (!currentSong) {
                if (songDisplay) songDisplay.style.display = 'none';
                return;
            }

            if (!audioPlayer) return;

            const currentTime = audioPlayer.currentTime;
            const duration = currentSong.durationSeconds || audioPlayer.duration;

            if (!duration || isNaN(duration) || duration <= 0) {
                // If duration is not available yet, show it anyway
                if (songDisplay) songDisplay.style.display = 'flex';
                return;
            }

            const showStartTime = 5;
            const showEndTime = duration - 5;

            if (currentTime <= showStartTime || currentTime >= showEndTime) {
                if (songDisplay) songDisplay.style.display = 'flex';
            } else {
                if (songDisplay) songDisplay.style.display = 'none';
            }
        }

        if (audioPlayer) {
            audioPlayer.ontimeupdate = () => {
                checkVisibility();
            };
        }

        function clearDisplay() {
            currentSong = null;
            const songDisplay = document.getElementById('song-display');
            const songTitle = document.getElementById('song-title');
            const songArt = document.getElementById('song-art');
            if (songDisplay) songDisplay.style.display = 'none';
            if (songTitle) songTitle.textContent = '';
            if (songArt) {
                songArt.src = '';
                songArt.style.display = 'none';
            }
        }

        function stopPlayback() {
            audioPlayer.pause();
            audioPlayer.src = "";
            clearDisplay();
        }

        function handlePauseStatus(isPaused) {
            if (isPaused) {
                audioPlayer.pause();
            } else if (audioPlayer.src && audioPlayer.src !== "" && !audioPlayer.src.endsWith('/null')) {
                // If src was encoded, it might be already good, but play() is called on current src
                audioPlayer.play().catch(error => {
                    console.error("Failed to resume playback:", error);
                });
            }
        }

        function triggerRainEffect(rainEffect) {
            const content = rainEffect.content;
            const duration = rainEffect.duration || 5000;
            const isUrl = content.startsWith('http');
            const startTime = Date.now();

            const interval = setInterval(() => {
                if (Date.now() - startTime > duration) {
                    clearInterval(interval);
                    return;
                }

                createRainItem(content, isUrl);
            }, 100);
        }

        function createRainItem(content, isUrl) {
            const item = document.createElement('div');
            item.className = 'rain-item';
            
            if (isUrl) {
                const img = document.createElement('img');
                img.src = content;
                img.className = 'rain-image';
                item.appendChild(img);
            } else {
                item.innerText = content;
            }

            const startLeft = Math.random() * 100;
            const fallDuration = 2 + Math.random() * 3; // 2-5 seconds to fall
            
            item.style.left = startLeft + 'vw';
            item.style.animationDuration = fallDuration + 's';
            
            document.body.appendChild(item);
            
            // Remove element after it finishes falling
            setTimeout(() => {
                item.remove();
            }, fallDuration * 1000 + 100);
        }

        function triggerPlacementEffect(effect) {
            const img = document.createElement('img');
            
            let url = effect.url;
            img.src = url;
            
            img.className = 'placement-effect';
            
            if (effect.x !== undefined && effect.x !== null) {
                img.style.left = effect.x + (Number.isInteger(effect.x) ? 'px' : '');
            } else {
                img.style.left = '50%';
                img.style.transform = 'translateX(-50%)';
            }
            
            if (effect.y !== undefined && effect.y !== null) {
                img.style.top = effect.y + (Number.isInteger(effect.y) ? 'px' : '');
            } else {
                img.style.top = '50%';
                if (img.style.transform) {
                    img.style.transform += ' translateY(-50%)';
                } else {
                    img.style.transform = 'translateY(-50%)';
                }
            }
            
            if (effect.width) img.style.width = effect.width + 'px';
            if (effect.height) img.style.height = effect.height + 'px';
            
            document.body.appendChild(img);
            
            setTimeout(() => {
                img.remove();
            }, effect.duration || 5000);
        }

        function notifySongFinished() {
            if (stompClient && stompClient.connected) {
                stompClient.send("/app/song-finished", {}, JSON.stringify({status: "finished"}));
            }
        }

        connect();
    </script>
</body>
</html>
