<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Bot Streamer UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; height: 100vh; display: flex; flex-direction: column; }
        [data-bs-theme="dark"] body { background-color: #212529; color: #f8f9fa; }
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #343a40;
            color: white;
            z-index: 1030;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }
        .status-item { margin-right: 20px; font-size: 0.9rem; }
        .status-label { color: #adb5bd; margin-right: 5px; }
        .status-value { font-weight: bold; }
        .status-online { color: #28a745; }
        .status-offline { color: #dc3545; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .left-panel { flex: 7; overflow-y: auto; padding: 20px; border-right: 1px solid #dee2e6; }
        .right-panel { flex: 3; overflow-y: auto; padding: 20px; background-color: #fff; }
        [data-bs-theme="dark"] .left-panel { border-right-color: #495057; }
        [data-bs-theme="dark"] .right-panel { background-color: #2b3035; }

        .card { margin-bottom: 20px; }
        #redeem-log {
            font-family: monospace;
            font-size: 0.85rem;
        }
        .redeem-entry {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f1f3f5;
        }
        [data-bs-theme="dark"] .redeem-entry { border-bottom-color: #495057; }
        .redeem-time { color: #6c757d; font-size: 0.75rem; }
        .redeem-user { font-weight: bold; color: #0d6efd; }
        [data-bs-theme="dark"] .redeem-user { color: #3d8bfd; }
        .redeem-reward { color: #198754; }
        [data-bs-theme="dark"] .redeem-reward { color: #75b798; }

        .stat-card {
            background-color: #f1f3f5;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        [data-bs-theme="dark"] .stat-card { background-color: #2b3035; }
        .stat-rank { font-weight: bold; margin-right: 10px; color: #6c757d; }
        .stat-title { font-weight: bold; }
        .stat-count { float: right; color: #0d6efd; font-weight: bold; }
        [data-bs-theme="dark"] .stat-count { color: #3d8bfd; }

        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
        }
        [data-bs-theme="dark"] .auth-card { background: #2b3035; color: white; }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div class="auth-card">
            <h3 class="mb-3">Streamer Access</h3>
            <div class="mb-3">
                <label class="form-label">API Key</label>
                <input type="password" class="form-control" id="api-key-input">
            </div>
            <button class="btn btn-primary w-100" onclick="saveApiKey()">Login</button>
        </div>
    </div>

    <div class="status-bar">
        <div class="d-flex align-items-center">
            <span class="h5 mb-0 me-4">Twitch Bot Streamer UI</span>
            <div class="status-item">
                <span class="status-label">Stream:</span>
                <span id="stat-stream" class="status-value status-offline">OFFLINE</span>
            </div>
            <div class="status-item">
                <span class="status-label">Twitch:</span>
                <span id="stat-twitch" class="status-value status-offline">DISCONNECTED</span>
            </div>
            <div class="status-item">
                <span class="status-label">Queue:</span>
                <span id="stat-queue" class="status-value">0</span>
                <span id="stat-queue-count" style="display: none;">0</span>
            </div>
            <div class="status-item">
                <span class="status-label">Playing:</span>
                <span id="stat-playing" class="status-value text-info">None</span>
                <span id="stat-play-status" style="display: none;">Idle</span>
            </div>
        </div>
        <div>
            <button id="theme-toggle" class="btn btn-outline-light btn-sm me-2" onclick="toggleTheme()">🌙</button>
            <a href="/statistics.html" class="btn btn-outline-light btn-sm me-2">Statistics</a>
        </div>
    </div>

    <div class="main-container">
        <div class="left-panel">
            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">Top 5 Songs (All Time)</div>
                        <div id="top-songs-stats" class="card-body">
                            <!-- Stats here -->
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">Recent Plays</div>
                        <div id="recent-plays-stats" class="card-body">
                            <!-- Recent plays here -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    Songs Database
                    <button class="btn btn-sm btn-outline-secondary" onclick="fetchSongs()">Refresh</button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Artist</th>
                                    <th>Plays</th>
                                    <th>Redeems</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="songs-table-body">
                                <!-- Songs loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>

        <div class="right-panel">
            <h5 class="mb-3">Event Log (Redeems, Subs, Follows)</h5>
            <div id="redeem-log">
                <!-- Redeems added here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script>
        let stompClient = null;

        function connectWebSocket() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/topic/redeems', function (response) {
                    addRedeemToLog(JSON.parse(response.body));
                });
                stompClient.subscribe('/topic/queue-size', function (response) {
                    updateQueueSizeDisplay(JSON.parse(response.body));
                });
                stompClient.subscribe('/topic/stream-status', function (response) {
                    updateStreamStatusDisplay(JSON.parse(response.body));
                });
                stompClient.subscribe('/topic/connection-status', function (response) {
                    updateConnectionStatusDisplay(JSON.parse(response.body));
                });
                stompClient.subscribe('/topic/current-song', function (response) {
                    updateCurrentSongDisplay(JSON.parse(response.body || 'null'));
                });
                stompClient.subscribe('/topic/songs', function (response) {
                    fetchSongs();
                });
            }, function (error) {
                console.error('WebSocket Error: ' + error);
                setTimeout(connectWebSocket, 5000);
            });
        }

        function addRedeemToLog(redeem, prepend = true) {
            const logEl = document.getElementById('redeem-log');
            const entry = document.createElement('div');
            entry.className = 'redeem-entry';
            const time = new Date(redeem.timestamp).toLocaleTimeString();
            entry.innerHTML = `
                <div class="redeem-time">${time}</div>
                <div><span class="redeem-user">${redeem.user}</span>: <span class="redeem-reward">${redeem.rewardTitle}</span></div>
            `;
            if (prepend) {
                logEl.insertBefore(entry, logEl.firstChild);
            } else {
                logEl.appendChild(entry);
            }
        }

        async function fetchRecentRedeems() {
            const key = getApiKey();
            if (!key) return;
            try {
                const response = await fetch('/api/twitch-config/redeems', { headers: { 'X-API-Key': key } });
                if (response.status === 401) return logout();
                const redeems = await response.json();
                const logEl = document.getElementById('redeem-log');
                logEl.innerHTML = '';
                redeems.reverse().forEach(redeem => addRedeemToLog(redeem, false));
            } catch (error) { console.error('Error fetching redeems:', error); }
        }

        function getApiKey() { return localStorage.getItem('twitch_bot_api_key') || ''; }
        function saveApiKey() {
            const key = document.getElementById('api-key-input').value;
            if (key) {
                localStorage.setItem('twitch_bot_api_key', key);
                location.reload();
            }
        }
        function logout() {
            localStorage.removeItem('twitch_bot_api_key');
            location.reload();
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
        }

        function updateThemeButton(theme) {
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.innerText = theme === 'dark' ? '☀️' : '🌙';
        }

        // Apply theme on load
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
            document.addEventListener('DOMContentLoaded', () => updateThemeButton(savedTheme));
        })();

        function checkAuth() {
            const key = getApiKey();
            document.getElementById('auth-overlay').style.display = key ? 'none' : 'flex';
        }

        function updateQueueSizeDisplay(size) {
            document.getElementById('stat-queue').innerText = size;
            document.getElementById('stat-queue-count').innerText = size;
        }

        function updateStreamStatusDisplay(isOnline) {
            const el = document.getElementById('stat-stream');
            el.innerText = isOnline ? 'ONLINE' : 'OFFLINE';
            el.className = 'status-value ' + (isOnline ? 'status-online' : 'status-offline');
        }

        function updateConnectionStatusDisplay(isConnected) {
            const el = document.getElementById('stat-twitch');
            el.innerText = isConnected ? 'CONNECTED' : 'DISCONNECTED';
            el.className = 'status-value ' + (isConnected ? 'status-online' : 'status-offline');
        }

        function updateCurrentSongDisplay(song) {
            const el = document.getElementById('stat-playing');
            const statusEl = document.getElementById('stat-play-status');
            if (song) {
                const text = `${song.name} - ${song.artist}`;
                el.innerText = text;
                el.classList.add('text-info');
                statusEl.innerText = "Playing";
                statusEl.className = "stat-count text-info";
            } else {
                el.innerText = 'None';
                el.classList.remove('text-info');
                statusEl.innerText = "Idle";
                statusEl.className = "stat-count";
            }
        }

        async function refreshInitialStatus() {
            const key = getApiKey();
            if (!key) return;
            try {
                // Stream status
                let res = await fetch('/api/twitch-config/status', { headers: { 'X-API-Key': key } });
                if (res.ok) updateStreamStatusDisplay(await res.json());

                // Connection status
                res = await fetch('/api/twitch-config/connection', { headers: { 'X-API-Key': key } });
                if (res.ok) updateConnectionStatusDisplay(await res.json());

                // Queue size
                res = await fetch('/api/songs/queue-size', { headers: { 'X-API-Key': key } });
                if (res.ok) updateQueueSizeDisplay(await res.json());

                // Current song
                res = await fetch('/api/songs/current', { headers: { 'X-API-Key': key } });
                if (res.status === 200) updateCurrentSongDisplay(await res.json());
                else updateCurrentSongDisplay(null);

                // Initial songs and stats
                fetchSongs();
            } catch (e) { console.error('Error refreshing status:', e); }
        }

        async function fetchSongs() {
            const key = getApiKey();
            if (!key) return;
            try {
                const response = await fetch('/api/songs', { headers: { 'X-API-Key': key } });
                if (response.status === 401) return logout();
                const songs = await response.json();
                const tbody = document.getElementById('songs-table-body');
                tbody.innerHTML = '';
                
                // Update stats
                updateTopSongs(songs);

                songs.forEach(song => {
                    const tr = document.createElement('tr');
                    const redeemTitles = song.redeems.map(r => r.title).join(', ');
                    tr.innerHTML = `
                        <td>${song.id}</td>
                        <td>${song.name}</td>
                        <td>${song.artist}</td>
                        <td><span class="badge bg-light text-dark">${song.playCount || 0}</span></td>
                        <td>${redeemTitles}</td>
                        <td>
                            <button class="btn btn-sm btn-success" onclick="playSong(${song.id})">Play</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) { console.error('Error fetching songs:', error); }
        }

        function updateTopSongs(songs) {
            const topSongs = [...songs]
                .sort((a, b) => (b.playCount || 0) - (a.playCount || 0))
                .slice(0, 5);
            
            const statsEl = document.getElementById('top-songs-stats');
            statsEl.innerHTML = '';
            
            if (topSongs.length === 0 || topSongs[0].playCount === 0) {
                statsEl.innerHTML = '<div class="text-muted text-center py-3">No play data yet</div>';
                return;
            }

            topSongs.forEach((song, index) => {
                if ((song.playCount || 0) === 0) return;
                const div = document.createElement('div');
                div.className = 'stat-card';
                div.innerHTML = `
                    <span class="stat-rank">#${index + 1}</span>
                    <span class="stat-title">${song.name}</span>
                    <span class="stat-count">${song.playCount} plays</span>
                `;
                statsEl.appendChild(div);
            });

            // Also fetch recent plays
            // fetchRecentPlays();
        }

        async function fetchRecentPlays() {
            const key = getApiKey();
            try {
                const response = await fetch('/api/songs/plays/recent?limit=5', { headers: { 'X-API-Key': key } });
                if (!response.ok) return;
                const plays = await response.json();
                const statsEl = document.getElementById('recent-plays-stats');
                statsEl.innerHTML = '';
                
                if (plays.length === 0) {
                    statsEl.innerHTML = '<div class="text-muted text-center py-3">No recent plays</div>';
                    return;
                }

                plays.forEach(play => {
                    const div = document.createElement('div');
                    div.className = 'stat-card';
                    const time = new Date(play.timestamp).toLocaleTimeString();
                    div.innerHTML = `
                        <span class="stat-rank">${time}</span>
                        <span class="stat-title">${play.song.name}</span>
                        <span class="stat-count">${play.source}</span>
                    `;
                    statsEl.appendChild(div);
                });
            } catch (error) { console.error('Error fetching recent plays:', error); }
        }

        async function fetchRedeems() {
            const key = getApiKey();
            if (!key) return;
            try {
                const response = await fetch('/api/redeems', { headers: { 'X-API-Key': key } });
                if (response.status === 401) return logout();
                const allRedeems = await response.json();
                
                // Update redeems list
                const listEl = document.getElementById('redeems-list');
                listEl.innerHTML = '';
                allRedeems.forEach(redeem => {
                    const badge = document.createElement('span');
                    badge.className = 'badge bg-secondary';
                    badge.textContent = redeem.title;
                    listEl.appendChild(badge);
                });
            } catch (error) { console.error('Error fetching redeems:', error); }
        }


        async function playSong(id) {
            const key = getApiKey();
            try {
                const response = await fetch(`/api/songs/${id}/play?incrementStats=true`, { method: 'POST', headers: { 'X-API-Key': key } });
                if (response.ok) { /* WebSocket will update queue size */ }
                else { alert(await response.text()); }
            } catch (error) { console.error('Error playing song:', error); }
        }

        checkAuth();
        if (getApiKey()) {
            refreshInitialStatus();
            fetchRecentRedeems();
            connectWebSocket();
        }
    </script>
</body>
</html>
