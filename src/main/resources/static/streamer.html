<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Bot Streamer UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/common.css" rel="stylesheet">
    <style>
        .stat-card {
            background-color: #f1f3f5;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        [data-bs-theme="dark"] .stat-card { background-color: #2b3035; }
        .stat-rank { font-weight: bold; margin-right: 10px; color: #6c757d; }
        .stat-title { font-weight: bold; }
        .stat-count { float: right; color: #0d6efd; font-weight: bold; }
        [data-bs-theme="dark"] .stat-count { color: #3d8bfd; }
    </style>
</head>
<body>
    <div class="status-bar">
        <div class="d-flex align-items-center">
            <span class="h5 mb-0 me-4">Twitch Bot Streamer UI</span>
            <div class="status-item">
                <span class="status-label">Stream:</span>
                <span id="stat-stream" class="status-value status-offline">OFFLINE</span>
            </div>
            <div class="status-item">
                <span class="status-label">Twitch:</span>
                <span id="stat-twitch" class="status-value status-offline">DISCONNECTED</span>
            </div>
            <div class="status-item">
                <span class="status-label">Queue:</span>
                <span id="stat-queue" class="status-value">0</span>
                <span id="stat-queue-count" style="display: none;">0</span>
            </div>
            <div class="status-item">
                <span class="status-label">Playing:</span>
                <span id="stat-playing" class="status-value text-info">None</span>
                <span id="stat-play-status" style="display: none;">Idle</span>
            </div>
            <button class="btn btn-primary btn-sm ms-2" onclick="playRandomSong()" title="Play a random song">Play Random</button>
        </div>
        <div>
            <button id="theme-toggle" class="btn btn-outline-light btn-sm me-2" onclick="toggleTheme()">🌙</button>
            <a href="/admin.html" class="btn btn-outline-light btn-sm me-2" data-role="ROLE_ADMIN">Admin</a>
            <a href="/streamer.html" class="btn btn-outline-light btn-sm me-2" data-role="ROLE_STREAMER">Streamer</a>
            <a href="/song-management.html" class="btn btn-outline-light btn-sm me-2" data-role="ROLE_UPLOAD">Songs</a>
            <a href="/status.html" class="btn btn-outline-light btn-sm me-2">Status</a>
            <a href="/account.html" class="btn btn-outline-light btn-sm me-2">Account</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </div>

    <div class="main-container">
        <div class="left-panel">
            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">Top 5 Songs (All Time)</div>
                        <div id="top-songs-stats" class="card-body">
                            <!-- Stats here -->
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">Recent Plays</div>
                        <div id="recent-plays-stats" class="card-body">
                            <!-- Recent plays here -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    Songs Database
                    <button class="btn btn-sm btn-outline-secondary" onclick="fetchSongs()">Refresh</button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Art</th>
                                    <th>Name</th>
                                    <th>Artist</th>
                                    <th>Plays</th>
                                    <th>Redeems</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="songs-table-body">
                                <!-- Songs loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>

        <div class="right-panel">
            <h5 class="mb-3">Event Log (Redeems, Subs, Follows)</h5>
            <div id="redeem-log">
                <!-- Redeems added here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/common.js"></script>
    <script>
        let stompClient = null;

        function connectWebSocket() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/topic/redeems', function (response) {
                    addRedeemToLog(JSON.parse(response.body));
                });
                stompClient.subscribe('/topic/queue-size', function (response) {
                    updateQueueSizeDisplay(JSON.parse(response.body));
                });
                stompClient.subscribe('/topic/stream-status', function (response) {
                    updateStreamStatusDisplay(JSON.parse(response.body));
                });
                stompClient.subscribe('/topic/connection-status', function (response) {
                    updateConnectionStatusDisplay(JSON.parse(response.body));
                });
                stompClient.subscribe('/topic/current-song', function (response) {
                    const body = response.body;
                    const song = (body && body !== 'null' && body !== '') ? JSON.parse(body) : null;
                    updateCurrentSongDisplay(song);
                });
                stompClient.subscribe('/topic/songs', function (response) {
                    fetchSongs();
                });
            }, function (error) {
                console.error('WebSocket Error: ' + error);
                setTimeout(connectWebSocket, 5000);
            });
        }

        function addRedeemToLog(redeem, prepend = true) {
            const logEl = document.getElementById('redeem-log');
            const entry = document.createElement('div');
            entry.className = 'redeem-entry';
            const time = new Date(redeem.timestamp).toLocaleTimeString();
            entry.innerHTML = `
                <div class="redeem-time">${time}</div>
                <div><span class="redeem-user">${redeem.user}</span>: <span class="redeem-reward">${redeem.rewardTitle}</span></div>
            `;
            if (prepend) {
                logEl.insertBefore(entry, logEl.firstChild);
            } else {
                logEl.appendChild(entry);
            }
        }

        async function fetchRecentRedeems() {
            try {
                const response = await fetch('/api/twitch-config/redeems', {
                    headers: { 'X-API-KEY': getApiKey() }
                });
                if (response.status === 401 || response.status === 403) {
                    handleAuthError();
                    return;
                }
                const redeems = await response.json();
                const logEl = document.getElementById('redeem-log');
                logEl.innerHTML = '';
                redeems.reverse().forEach(redeem => addRedeemToLog(redeem, false));
            } catch (error) { console.error('Error fetching redeems:', error); }
        }

        function logout() {
            window.location.href = '/logout';
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
        }

        function updateThemeButton(theme) {
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.innerText = theme === 'dark' ? '☀️' : '🌙';
        }

        // Apply theme on load
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
            document.addEventListener('DOMContentLoaded', () => updateThemeButton(savedTheme));
        })();

        function updateQueueSizeDisplay(size) {
            document.getElementById('stat-queue').innerText = size;
            document.getElementById('stat-queue-count').innerText = size;
        }

        function updateStreamStatusDisplay(isOnline) {
            const el = document.getElementById('stat-stream');
            el.innerText = isOnline ? 'ONLINE' : 'OFFLINE';
            el.className = 'status-value ' + (isOnline ? 'status-online' : 'status-offline');
        }

        function updateConnectionStatusDisplay(isConnected) {
            const el = document.getElementById('stat-twitch');
            el.innerText = isConnected ? 'CONNECTED' : 'DISCONNECTED';
            el.className = 'status-value ' + (isConnected ? 'status-online' : 'status-offline');
        }

        function updateCurrentSongDisplay(song) {
            const el = document.getElementById('stat-playing');
            const statusEl = document.getElementById('stat-play-status');
            if (song) {
                const text = `${song.name} - ${song.artist}`;
                el.innerText = text;
                el.classList.add('text-info');
                statusEl.innerText = "Playing";
                statusEl.className = "stat-count text-info";
            } else {
                el.innerText = 'None';
                el.classList.remove('text-info');
                statusEl.innerText = "Idle";
                statusEl.className = "stat-count";
            }
        }

        async function refreshInitialStatus() {
            try {
                const headers = { 'X-API-KEY': getApiKey() };
                // Stream status
                let res = await fetch('/api/twitch-config/status', { headers });
                if (res.status === 401 || res.status === 403) {
                    handleAuthError();
                    return;
                }
                if (res.ok) updateStreamStatusDisplay(await res.json());

                // Connection status
                res = await fetch('/api/twitch-config/connection', { headers });
                if (res.ok) updateConnectionStatusDisplay(await res.json());

                // Queue size
                res = await fetch('/api/songs/queue-size', { headers });
                if (res.ok) updateQueueSizeDisplay(await res.json());

                // Current song
                res = await fetch('/api/songs/current', { headers });
                if (res.status === 200) updateCurrentSongDisplay(await res.json());
                else updateCurrentSongDisplay(null);

                // Initial songs and stats
                fetchSongs();
            } catch (e) { console.error('Error refreshing status:', e); }
        }

        async function fetchSongs() {
            try {
                const response = await fetch('/api/songs', {
                    headers: { 'X-API-KEY': getApiKey() }
                });
                if (response.status === 401 || response.status === 403) {
                    handleAuthError();
                    return;
                }
                const songs = await response.json();
                const tbody = document.getElementById('songs-table-body');
                tbody.innerHTML = '';
                
                // Update stats
                updateTopSongs(songs);

                songs.forEach(song => {
                    const tr = document.createElement('tr');
                    const redeemTitles = song.redeems.map(r => r.title).join(', ');
                    const artImg = song.coverArt ? `<img src="${song.coverArt}" alt="Art" style="width: 30px; height: 30px; object-fit: cover; border-radius: 2px;">` : '';
                    tr.innerHTML = `
                        <td>${song.id}</td>
                        <td>${artImg}</td>
                        <td>${song.name}</td>
                        <td>${song.artist}</td>
                        <td><span class="badge bg-light text-dark">${song.playCount || 0}</span></td>
                        <td>${redeemTitles}</td>
                        <td>
                            <button class="btn btn-sm btn-success" onclick="playSong(${song.id})">Play</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) { console.error('Error fetching songs:', error); }
        }

        function updateTopSongs(songs) {
            const topSongs = [...songs]
                .sort((a, b) => (b.playCount || 0) - (a.playCount || 0))
                .slice(0, 5);
            
            const statsEl = document.getElementById('top-songs-stats');
            statsEl.innerHTML = '';
            
            if (topSongs.length === 0 || topSongs[0].playCount === 0) {
                statsEl.innerHTML = '<div class="text-muted text-center py-3">No play data yet</div>';
                return;
            }

            topSongs.forEach((song, index) => {
                if ((song.playCount || 0) === 0) return;
                const div = document.createElement('div');
                div.className = 'stat-card d-flex align-items-center gap-2';
                const artImg = song.coverArt ? `<img src="${song.coverArt}" alt="Art" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px;">` : '<div style="width: 40px; height: 40px; background: #eee; border-radius: 4px;"></div>';
                div.innerHTML = `
                    <span class="stat-rank">#${index + 1}</span>
                    ${artImg}
                    <span class="stat-title" style="flex: 1">${song.name}</span>
                    <span class="stat-count">${song.playCount} plays</span>
                `;
                statsEl.appendChild(div);
            });

            // Also fetch recent plays
            // fetchRecentPlays();
        }

        async function fetchRecentPlays() {
            try {
                const response = await fetch('/api/songs/plays/recent?limit=5');
                if (response.status === 401 || response.status === 403) {
                    return;
                }
                if (!response.ok) return;
                const plays = await response.json();
                const statsEl = document.getElementById('recent-plays-stats');
                statsEl.innerHTML = '';
                
                if (plays.length === 0) {
                    statsEl.innerHTML = '<div class="text-muted text-center py-3">No recent plays</div>';
                    return;
                }

                plays.forEach(play => {
                    const div = document.createElement('div');
                    div.className = 'stat-card d-flex align-items-center gap-2';
                    const time = new Date(play.timestamp).toLocaleTimeString();
                    const artImg = play.song.coverArt ? `<img src="${play.song.coverArt}" alt="Art" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px;">` : '<div style="width: 40px; height: 40px; background: #eee; border-radius: 4px;"></div>';
                    div.innerHTML = `
                        <span class="stat-rank">${time}</span>
                        ${artImg}
                        <span class="stat-title" style="flex: 1">${play.song.name}</span>
                        <span class="stat-count">${play.source}</span>
                    `;
                    statsEl.appendChild(div);
                });
            } catch (error) { console.error('Error fetching recent plays:', error); }
        }

        async function fetchRedeems() {
            try {
                const response = await fetch('/api/redeems');
                if (response.status === 401 || response.status === 403) {
                    return;
                }
                const allRedeems = await response.json();
                
                // Update redeems list
                const listEl = document.getElementById('redeems-list');
                listEl.innerHTML = '';
                allRedeems.forEach(redeem => {
                    const badge = document.createElement('span');
                    badge.className = 'badge bg-secondary';
                    badge.textContent = redeem.title;
                    listEl.appendChild(badge);
                });
            } catch (error) { console.error('Error fetching redeems:', error); }
        }


        async function playSong(id) {
            try {
                const response = await fetch(`/api/songs/${id}/play?incrementStats=true`, { 
                    method: 'POST'
                });
                if (response.status === 401 || response.status === 403) {
                    return;
                }
                if (response.ok) { /* WebSocket will update queue size */ }
                else { alert(await response.text()); }
            } catch (error) { console.error('Error playing song:', error); }
        }

        async function playRandomSong() {
            try {
                const response = await fetch('/api/songs/random/play', { 
                    method: 'POST'
                });
                if (response.status === 401 || response.status === 403) {
                    return;
                }
                if (response.ok) { /* WebSocket will update queue size */ }
                else { alert(await response.text()); }
            } catch (error) { console.error('Error playing random song:', error); }
        }

        refreshInitialStatus();
        fetchRecentRedeems();
        fetchRecentPlays();
        connectWebSocket();
    </script>
</body>
</html>
