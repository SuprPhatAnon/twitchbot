<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Bot Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; background-color: #f8f9fa; }
        [data-bs-theme="dark"] body { background-color: #212529; color: #f8f9fa; }
        .status-card { margin-bottom: 20px; }
        .badge-status { font-size: 0.9rem; }
        .subscription-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #dee2e6; }
        [data-bs-theme="dark"] .subscription-item { border-bottom-color: #495057; }
        .subscription-item:last-child { border-bottom: none; }
        .navbar { background-color: #343a40; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin.html">Twitch Bot Admin</a>
            <div class="navbar-nav ms-auto">
                <button id="theme-toggle" class="btn btn-outline-light btn-sm me-2" onclick="toggleTheme()">🌙</button>
                <a href="/admin.html" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
                <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>System Status</h1>
            <button class="btn btn-primary" onclick="refreshStatus()">Refresh</button>
        </div>

        <div class="row">
            <!-- Stream Status -->
            <div class="col-md-4">
                <div class="card status-card">
                    <div class="card-header bg-dark text-white">Stream Status</div>
                    <div class="card-body text-center">
                        <h3 id="stream-status" class="mb-0">-</h3>
                        <p class="text-muted mt-2">Current broadcast state</p>
                    </div>
                </div>
            </div>

            <!-- EventSub Connection (Streamer) -->
            <div class="col-md-4">
                <div class="card status-card">
                    <div class="card-header bg-dark text-white">EventSub (Streamer)</div>
                    <div class="card-body text-center">
                        <h3 id="streamer-connection" class="mb-0">-</h3>
                        <p class="text-muted mt-2">WebSocket connection state</p>
                    </div>
                </div>
            </div>

            <!-- EventSub Connection (Bot) -->
            <div class="col-md-4">
                <div class="card status-card">
                    <div class="card-header bg-dark text-white">EventSub (Bot)</div>
                    <div class="card-body text-center">
                        <h3 id="bot-connection" class="mb-0">-</h3>
                        <p class="text-muted mt-2">WebSocket connection state</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <!-- Streamer Subscriptions -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-dark text-white">Streamer Subscriptions</div>
                    <div class="card-body" id="streamer-subscriptions">
                        <div class="text-center text-muted">No subscriptions tracked</div>
                    </div>
                </div>
            </div>

            <!-- Bot Subscriptions -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-dark text-white">Bot Subscriptions</div>
                    <div class="card-body" id="bot-subscriptions">
                        <div class="text-center text-muted">No subscriptions tracked</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function refreshStatus() {
            fetch('/api/twitch-config/full-status')
                .then(response => {
                    if (response.status === 403 || response.status === 401) {
                        window.location.href = '/login.html';
                        return;
                    }
                    return response.json();
                })
                .then(data => {
                    if (!data) return;
                    updateUI(data);
                })
                .catch(error => console.error('Error fetching status:', error));
        }

        function updateUI(data) {
            // Stream Status
            const streamEl = document.getElementById('stream-status');
            streamEl.innerText = data.streamOnline ? 'ONLINE' : 'OFFLINE';
            streamEl.className = data.streamOnline ? 'text-success' : 'text-danger';

            // Connection States
            updateConnectionStatus('streamer-connection', data.streamerConnectionState);
            updateConnectionStatus('bot-connection', data.botConnectionState);

            // Subscriptions
            renderSubscriptions('streamer-subscriptions', data.streamerSubscriptionStatus);
            renderSubscriptions('bot-subscriptions', data.botSubscriptionStatus);
        }

        function updateConnectionStatus(id, state) {
            const el = document.getElementById(id);
            el.innerText = state || 'UNKNOWN';
            if (state === 'CONNECTED') {
                el.className = 'text-success';
            } else if (state === 'CONNECTING' || state === 'RECONNECTING') {
                el.className = 'text-warning';
            } else {
                el.className = 'text-danger';
            }
        }

        function renderSubscriptions(id, subs) {
            const container = document.getElementById(id);
            if (!subs || Object.keys(subs).length === 0) {
                container.innerHTML = '<div class="text-center text-muted">No subscriptions active</div>';
                return;
            }

            let html = '';
            for (const [type, active] of Object.entries(subs)) {
                html += `
                    <div class="subscription-item">
                        <span>${type}</span>
                        <span class="badge ${active ? 'bg-success' : 'bg-danger'} badge-status">
                            ${active ? 'Active' : 'Failed'}
                        </span>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // Theme management
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('theme-toggle').innerText = newTheme === 'dark' ? '☀️' : '🌙';
        }

        // Initialize theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
        document.getElementById('theme-toggle').innerText = savedTheme === 'dark' ? '☀️' : '🌙';

        // Initial load and periodic refresh
        refreshStatus();
        setInterval(refreshStatus, 10000);
    </script>
</body>
</html>
