<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Info - Twitch Song Overlay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 20px; background-color: #f8f9fa; }
        [data-bs-theme="dark"] body { background-color: #212529; color: #f8f9fa; }
        .container { max-width: 600px; }
        .card { margin-bottom: 20px; }
        .api-key-container {
            background-color: #f1f3f5;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            word-break: break-all;
            margin-bottom: 10px;
            border: 1px solid #dee2e6;
        }
        [data-bs-theme="dark"] .api-key-container {
            background-color: #2b3035;
            border-color: #495057;
        }
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
        }
        [data-bs-theme="dark"] .auth-card { background: #2b3035; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Account Information</h1>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">Back</a>
        </div>

        <div class="card">
            <div class="card-header">User Profile</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label text-muted small uppercase">Username</label>
                    <div id="display-username" class="h5">-</div>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small uppercase">Roles</label>
                    <div id="display-roles" class="h5">-</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">API Key</div>
            <div class="card-body">
                <p class="text-muted small">Use this key in the <code>X-API-KEY</code> header to authenticate API requests without a password.</p>
                <div id="api-key-display" class="api-key-container">••••••••••••••••••••••••••••••••••••</div>
                <div class="btn-group w-100">
                    <button class="btn btn-sm btn-outline-primary" onclick="toggleApiKey()">Show/Hide Key</button>
                    <button class="btn btn-sm btn-outline-warning" onclick="rotateApiKey()">Rotate Key</button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="copyApiKey()">Copy Key</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Change Password</div>
            <div class="card-body">
                <form id="change-password-form">
                    <div class="mb-3">
                        <label for="new-password" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="new-password" required minlength="4">
                    </div>
                    <div class="mb-3">
                        <label for="confirm-password" class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control" id="confirm-password" required minlength="4">
                    </div>
                    <div id="password-error" class="text-danger mb-3" style="display: none;">Passwords do not match.</div>
                    <button type="submit" class="btn btn-primary w-100">Update Password</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Apply theme from localStorage
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-bs-theme', 'dark');
        }

        function getApiKey() {
            return '';
        }

        function logout() {
            window.location.href = '/logout';
        }

        let currentApiKey = '';
        let isKeyVisible = false;

        function updateApiKeyDisplay() {
            const display = document.getElementById('api-key-display');
            display.textContent = isKeyVisible ? currentApiKey : '••••••••••••••••••••••••••••••••••••';
        }

        function toggleApiKey() {
            isKeyVisible = !isKeyVisible;
            updateApiKeyDisplay();
        }

        async function rotateApiKey() {
            if (!confirm('Are you sure you want to rotate your API key? The old key will stop working immediately.')) {
                return;
            }
            try {
                const response = await fetch('/api/users/me/rotate-api-key', { 
                    method: 'POST'
                });
                if (response.status === 401 || response.status === 403) {
                    handleAuthError();
                    return;
                }
                if (response.ok) {
                    const user = await response.json();
                    currentApiKey = user.apiKey;
                    isKeyVisible = true;
                    updateApiKeyDisplay();
                    alert('API Key rotated successfully!');
                } else {
                    alert('Failed to rotate API key.');
                }
            } catch (error) {
                console.error('Error rotating API key:', error);
            }
        }

        function copyApiKey() {
            if (!currentApiKey || currentApiKey === 'No API key generated' || currentApiKey.startsWith('••••')) return;
            navigator.clipboard.writeText(currentApiKey).then(() => {
                alert('API Key copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy API key:', err);
            });
        }

        async function fetchAccountInfo() {
            try {
                const res = await fetch('/api/users/me');
                if (res.status === 401 || res.status === 403) {
                    handleAuthError();
                    return;
                }
                const user = await res.json();
                document.getElementById('display-username').innerText = user.username;
                document.getElementById('display-roles').innerText = user.roles.join(', ');
                
                // Get the actual key (it will be redacted if already hashed, but rotateApiKey returns the raw one)
                const keyRes = await fetch('/api/users/me/api-key');
                if (keyRes.ok) {
                    currentApiKey = await keyRes.text();
                } else {
                    currentApiKey = 'No API key generated';
                }
                updateApiKeyDisplay();
            } catch (err) {
                console.error('Failed to fetch account info', err);
            }
        }

        document.getElementById('change-password-form').onsubmit = async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('password-error');

            if (newPassword !== confirmPassword) {
                errorDiv.style.display = 'block';
                return;
            }
            errorDiv.style.display = 'none';

            try {
                const res = await fetch('/api/users/me/change-password', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-API-KEY': getApiKey()
                    },
                    body: JSON.stringify({ newPassword })
                });

                if (res.status === 401 || res.status === 403) {
                    handleAuthError();
                    return;
                }

                if (res.ok) {
                    alert('Password updated successfully!');
                    document.getElementById('change-password-form').reset();
                } else {
                    const text = await res.text();
                    alert('Failed to update password: ' + text);
                }
            } catch (err) {
                alert('An error occurred while updating password.');
            }
        };

        function handleAuthError() {
            window.location.href = '/login.html';
        }

        fetchAccountInfo();
    </script>
</body>
</html>
