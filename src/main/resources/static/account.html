<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Info - Twitch Song Overlay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 20px; background-color: #f8f9fa; }
        [data-bs-theme="dark"] body { background-color: #212529; color: #f8f9fa; }
        .container { max-width: 600px; }
        .card { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Account Information</h1>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">Back</a>
        </div>

        <div class="card">
            <div class="card-header">User Profile</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label text-muted small uppercase">Username</label>
                    <div id="display-username" class="h5">-</div>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small uppercase">Roles</label>
                    <div id="display-roles" class="h5">-</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Change Password</div>
            <div class="card-body">
                <form id="change-password-form">
                    <div class="mb-3">
                        <label for="new-password" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="new-password" required minlength="4">
                    </div>
                    <div class="mb-3">
                        <label for="confirm-password" class="form-label">Confirm New Password</label>
                        <input type="password" class="form-control" id="confirm-password" required minlength="4">
                    </div>
                    <div id="password-error" class="text-danger mb-3" style="display: none;">Passwords do not match.</div>
                    <button type="submit" class="btn btn-primary w-100">Update Password</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Apply theme from localStorage
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-bs-theme', 'dark');
        }

        async function fetchAccountInfo() {
            try {
                const res = await fetch('/api/users/me');
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/login.html';
                    return;
                }
                const user = await res.json();
                document.getElementById('display-username').innerText = user.username;
                document.getElementById('display-roles').innerText = user.roles.join(', ');
            } catch (err) {
                console.error('Failed to fetch account info', err);
            }
        }

        document.getElementById('change-password-form').onsubmit = async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('password-error');

            if (newPassword !== confirmPassword) {
                errorDiv.style.display = 'block';
                return;
            }
            errorDiv.style.display = 'none';

            try {
                const res = await fetch('/api/users/me/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newPassword })
                });

                if (res.ok) {
                    alert('Password updated successfully!');
                    document.getElementById('change-password-form').reset();
                } else {
                    const text = await res.text();
                    alert('Failed to update password: ' + text);
                }
            } catch (err) {
                alert('An error occurred while updating password.');
            }
        };

        fetchAccountInfo();
    </script>
</body>
</html>
