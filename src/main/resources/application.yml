spring:
  application:
    name: twitchbot
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:twitchdb}
    username: ${DB_USER:twitchuser}
    password: ${DB_PASSWORD:twitchpass}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: readinessState,db,redis
server:
  port: 8080

twitch:
  client-id: ${TWITCH_CLIENT_ID:your_client_id}
  client-secret: ${TWITCH_CLIENT_SECRET:your_client_secret}
  access-token: ${TWITCH_ACCESS_TOKEN:your_access_token}
  channel-name: ${TWITCH_CHANNEL_NAME:your_channel_name}
  redeem-title: ${TWITCH_REDEEM_TITLE:Play Random Song}
  api-key: ${API_KEY:default_secret_key}
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
