spring:
  flyway:
    placeholders:
      twitch.redirect-uri-host: localhost
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;MODE=MariaDB;DB_CLOSE_DELAY=-1}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    database-platform: ${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: validate
  config:
    activate:
      on-profile: test

twitch:
  client-id: test-id
  client-secret: test-secret
  access-token: test-token
  channel-name: test-channel
  redeem-title: Play Random Song
  api-key: test-api-key
  song-delay-seconds: 5
  redirect-uri-host: localhost
