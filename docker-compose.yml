version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: twitchbot-db
    environment:
      MARIADB_DATABASE: twitchdb
      MARIADB_USER: twitchuser
      MARIADB_PASSWORD: twitchpass
      MARIADB_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p$MARIADB_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: twitchbot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: twitchbot-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: twitchdb
      DB_USER: twitchuser
      DB_PASSWORD: twitchpass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
      TWITCH_ACCESS_TOKEN: ${TWITCH_ACCESS_TOKEN}
      TWITCH_CHANNEL_NAME: ${TWITCH_CHANNEL_NAME}
      TWITCH_REDEEM_TITLE: ${TWITCH_REDEEM_TITLE:-Play Random Song}
      API_KEY: ${API_KEY:-default_secret_key}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mariadb_data:
