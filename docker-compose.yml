services:
  mariadb:
    image: mariadb:10.11
    container_name: twitchbot-db
    environment:
      MARIADB_DATABASE: mariadb
      MARIADB_USER: mariadb
      MARIADB_PASSWORD: mariadb
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-mariadb}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -pmariadb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: twitchbot-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: mariadb
      DB_USER: mariadb
      DB_PASSWORD: mariadb
      API_KEY: ${API_KEY:-default_secret_key}
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:
