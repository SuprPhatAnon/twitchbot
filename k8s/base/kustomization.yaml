apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: streaming

resources:
  - namespace.yaml
  - mariadb/mariadb.yaml
  - app/app.yaml
  - app/ingress.yaml

configMapGenerator:
  - name: app-config
    literals:
      - SPRING_PROFILES_ACTIVE=prod
      - TWITCH_USE_LOCAL_CLI=false
      - TWITCH_LOCAL_CLI_URL=http://localhost:8080

secretGenerator:
  - name: app-secrets
    literals:
      - TWITCH_CLIENT_ID=your_client_id
      - TWITCH_CLIENT_SECRET=your_client_secret
      - TWITCH_ACCESS_TOKEN=test-token
      - TWITCH_BOT_ACCESS_TOKEN=your_bot_access_token
      - TWITCH_CHANNEL_NAME=your_channel_name
      - API_KEY=default_secret_key
  - name: db-secrets
    literals:
      - mariadb-root-password=mariadb
