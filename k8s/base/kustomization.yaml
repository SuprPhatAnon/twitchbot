apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: streaming

resources:
  - namespace.yaml
  - mariadb/mariadb.yaml
  - twitchbotapp/pvc.yaml
  - twitchbotapp/twitchbotapp.yaml
  - twitchbotapp/ingress.yaml

configMapGenerator:
  - name: twitchbotapp-config
    literals:
      - SPRING_PROFILES_ACTIVE=prod

secretGenerator:
  - name: twitchbotapp-secrets
    literals:
      - API_KEY=default_secret_key
      - UPLOAD_API_KEY=default_upload_secret_key
  - name: db-secrets
    literals:
      - mariadb-root-password=mariadb
