apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: twitchbotapp-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  rules:
  - host: music.phat.wtf
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: twitchbotapp
            port:
              number: 8080
