apiVersion: v1
kind: Service
metadata:
  name: twitchbotapp
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: twitchbotapp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twitchbotapp
spec:
  selector:
    matchLabels:
      app: twitchbotapp
  template:
    metadata:
      labels:
        app: twitchbotapp
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', "until nc -zv mariadb 3306; do echo waiting for mariadb; sleep 2; done;"]
      containers:
        - name: twitchbotapp
          image: localhost:30500/twitchbot-app:latest # Replace with actual image
          envFrom:
            - configMapRef:
                name: twitchbotapp-config
            - secretRef:
                name: twitchbotapp-secrets
          env:
            - name: DB_HOST
              value: "mariadb"
            - name: DB_USER
              value: "mariadb"
            - name: DB_PASSWORD
              value: "mariadb" # In production, this should probably be in a secret
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: song-uploads
              mountPath: /uploads/songs
      volumes:
        - name: song-uploads
          persistentVolumeClaim:
            claimName: song-uploads-pvc
