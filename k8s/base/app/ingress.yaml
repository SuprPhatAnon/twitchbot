apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod # Assuming cert-manager is used for TLS
spec:
  rules:
  - host: stream.phat.wtf
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: app
            port:
              number: 8080
  tls:
  - hosts:
    - stream.phat.wtf
    secretName: stream-phat-wtf-tls
